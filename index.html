@media print{.no-print{display:none!important;}body{background:white!important;}}
.spinner{border:3px solid #e5e7eb;border-top:3px solid #064e3b;border-radius:50%;width:24px;height:24px;animation:spin 0.8s linear infinite;}

table{border-collapse:collapse;width:100%;}
th,td{border:1px solid #e5e7eb;padding:8px 10px;text-align:left;font-size:13px;}

.card{background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.08);padding:20px;}

.top-nav-bar{background:#064e3b;position:sticky;top:0;z-index:40;}
.top-nav-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.12);}
.top-nav-tabs{display:flex;overflow-x:auto;scrollbar-width:none;}
.top-nav-tabs::-webkit-scrollbar{display:none;}
.top-nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 14px;font-size:11px;border:none;background:transparent;cursor:pointer;color:rgba(255,255,255,0.7);border-bottom:3px solid transparent;white-space:nowrap;gap:2px;min-width:64px;transition:all 0.15s;}
.top-nav-btn:hover{color:#fff;background:rgba(255,255,255,0.08);}
.top-nav-btn.active{color:#fff;border-bottom:3px solid #34d399;background:rgba(255,255,255,0.12);font-weight:700;}
.top-nav-icon{font-size:18px;line-height:1;}
@media(max-width:480px){.top-nav-btn{padding:6px 8px;font-size:9px;min-width:48px;}.top-nav-icon{font-size:15px;}.topbar-meta{display:none;}}

let state={
  currentUser:null,homeowners:[],paymentTypes:[],payments:[],
  expenseCategories:[],expenses:[],view:'login',loginMode:'staff',
  loading:false,toast:null,adminUsers:[],
  homeownerSort:{field:null,dir:'asc'},homeownerSearch:'',
  paymentFilter:{search:'',typeId:''},paymentSort:{field:null,dir:'asc'},
  reportMode:'yearly',reportYear:new Date().getFullYear(),reportMonth:new Date().getMonth(),
  reportMemberSearch:'',reportSelectedMembers:[],reportSelectedTypes:[],
  duesAnnualTarget:900,mobileSidebarOpen:false,
  certSelected:[],duesGridCollapsed:false,
  monthlyAmortYear:new Date().getFullYear(),monthlyAmortCollapsed:false,
};

const root=document.getElementById('app');
function setState(p){state={...state,...p};render();}
function toast(msg,isError=false){setState({toast:{msg,isError}});setTimeout(()=>setState({toast:null}),3500);}
function peso(n){return'PHP '+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'';return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});}
function fmtMonthYear(d){if(!d)return'';return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short'});}
function fmtPeriod(p){if(!p.period_from&&!p.period_to)return'';const f=fmtMonthYear(p.period_from),t=fmtMonthYear(p.period_to);if(f&&t)return f===t?f:`${f} – ${t}`;return f||t;}
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// AUTH
async function loginStaff(u,p){
  const{data,error}=await sb.rpc('verify_app_user',{p_username:u,p_password:p});
  if(error){toast('Login error: '+error.message,true);return;}
  if(!data||data.length===0){toast('Incorrect username or password.',true);return;}
  const user=data[0];
  setState({currentUser:{type:'staff',id:user.id,username:user.username,role:user.role,fullName:user.full_name},view:'dashboard'});
  await loadAllData();
}
async function loginMember(email){
  const{data,error}=await sb.from('homeowners').select('*').eq('email',email.trim()).maybeSingle();
  if(error){toast('Login error: '+error.message,true);return;}
  if(!data){toast('No homeowner record found. Contact the HOA admin.',true);return;}
  setState({currentUser:{type:'member',homeowner:data},view:'member-dashboard'});
  await loadAllData();
}
function logout(){setState({currentUser:null,view:'login',homeowners:[],payments:[],expenses:[]});}

// DATA
async function loadAllData(){
  if(!state.currentUser)return;
  if(state.currentUser.type==='staff'){
    const[hR,ptR,pR,ecR,eR]=await Promise.all([
      sb.from('homeowners').select('*').order('block').order('lot'),
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, homeowners(name,block,lot), payment_types(name)').order('payment_date',{ascending:false}),
      sb.from('expense_categories').select('*').order('sort_order'),
      sb.from('expenses').select('*, expense_categories(name)').order('expense_date',{ascending:false}),
    ]);
    setState({homeowners:hR.data||[],paymentTypes:ptR.data||[],payments:pR.data||[],expenseCategories:ecR.data||[],expenses:eR.data||[]});
  }else{
    const id=state.currentUser.homeowner.id;
    const[ptR,pR]=await Promise.all([
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, payment_types(name)').eq('homeowner_id',id).order('payment_date',{ascending:false}),
    ]);
    setState({paymentTypes:ptR.data||[],payments:pR.data||[],homeowners:[state.currentUser.homeowner]});
  }
}
async function loadAdminUsers(){
  const{data,error}=await sb.rpc('list_app_users');
  if(error){toast('Could not load admin accounts: '+error.message,true);return;}
  setState({adminUsers:data||[]});
}
function isValidIncome(p){ return !p.is_voided && p.is_waived !== true; }
function balanceFor(id){return state.payments.filter(p=>p.homeowner_id===id&&isValidIncome(p)).reduce((s,p)=>s+Number(p.amount),0);}
function isDuesUpdated(id){
  const ago=new Date();ago.setMonth(ago.getMonth()-3);
  return state.payments.some(p=>{
    if(p.homeowner_id!==id||p.is_voided)return false;
    if(!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return false;
    const d=new Date(p.period_to||p.period_from||p.payment_date);
    return d>=ago;
  });
}

// RENDER
function render(){
  if(state.loading){root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div class="spinner"></div></div>`;return;}
  let html='';
  if(!state.currentUser)html=renderLogin();
  else if(state.currentUser.type==='member')html=renderMember();
  else html=renderStaff();
  root.innerHTML=html+(state.toast?`<div style="position:fixed;bottom:20px;right:20px;padding:12px 16px;border-radius:10px;color:#fff;font-size:13px;z-index:99;background:${state.toast.isError?'#dc2626':'#059669'}">${esc(state.toast.msg)}</div>`:'');
  attachHandlers();
  if(state.currentUser?.type==='staff'&&state.view==='dashboard')setTimeout(renderCharts,0);
}

function renderView(){
  switch(state.view){

function renderCharts(){
  const yr=new Date().getFullYear();
  const ml=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const inc=new Array(12).fill(0);
  const exp=new Array(12).fill(0);
  state.payments.forEach(p=>{if(p.is_voided)return;const d=new Date(p.payment_date);if(d.getFullYear()===yr)inc[d.getMonth()]+=Number(p.amount);});
  state.expenses.forEach(e=>{const d=new Date(e.expense_date);if(d.getFullYear()===yr)exp[d.getMonth()]+=Number(e.amount);});
  const ic=document.getElementById('income-chart');
  const ec=document.getElementById('expense-chart');
  if(!ic||!ec||typeof Chart==='undefined')return;
  if(incChart)incChart.destroy();
  if(expChart)expChart.destroy();
  const opts={responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'₱'+v.toLocaleString()}}}};
  incChart=new Chart(ic,{type:'line',data:{labels:ml,datasets:[{label:'Collections',data:inc,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.3,fill:true,pointBackgroundColor:'#10b981'}]},options:opts});
  expChart=new Chart(ec,{type:'line',data:{labels:ml,datasets:[{label:'Expenses',data:exp,borderColor:'#f43f5e',backgroundColor:'rgba(244,63,94,0.1)',tension:0.3,fill:true,pointBackgroundColor:'#f43f5e'}]},options:opts});
}

// REPORTS
function renderReports(){
  const allYears=new Set();
  state.payments.forEach(p=>allYears.add(new Date(p.payment_date).getFullYear()));
  state.expenses.forEach(e=>allYears.add(new Date(e.expense_date).getFullYear()));
  allYears.add(new Date().getFullYear());
  const years=[...allYears].sort((a,b)=>b-a);
  const mode=state.reportMode;
  const selYear=typeof state.reportYear==='number'?state.reportYear:new Date().getFullYear();
  const selMonth=state.reportMonth;
  const mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let yPay,yExp,periodLabel;
  if(mode==='all'){yPay=state.payments;yExp=state.expenses;periodLabel='All Time';}
  else if(mode==='monthly'){yPay=state.payments.filter(p=>{const d=new Date(p.payment_date);return d.getFullYear()===selYear&&d.getMonth()===selMonth;});yExp=state.expenses.filter(e=>{const d=new Date(e.expense_date);return d.getFullYear()===selYear&&d.getMonth()===selMonth;});periodLabel=`${mNames[selMonth]} ${selYear}`;}
  else{yPay=state.payments.filter(p=>new Date(p.payment_date).getFullYear()===selYear);yExp=state.expenses.filter(e=>new Date(e.expense_date).getFullYear()===selYear);periodLabel=`Year ${selYear}`;}
  const ti=yPay.filter(isValidIncome).reduce((s,p)=>s+Number(p.amount),0);
  const te=yExp.reduce((s,e)=>s+Number(e.amount),0);
  const net=ti-te;
  const ibt=state.paymentTypes.map(t=>({name:t.name,total:yPay.filter(p=>isValidIncome(p)&&p.payment_type_id===t.id).reduce((s,p)=>s+Number(p.amount),0)})).filter(x=>x.total>0);
  const ebc=state.expenseCategories.map(c=>({name:c.name,total:yExp.filter(e=>e.category_id===c.id).reduce((s,e)=>s+Number(e.amount),0)})).filter(x=>x.total>0);
  return`<div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;" class="no-print">
  <h1 style="font-weight:700;font-size:20px;">📈 Financial Report</h1>
  <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
    <select id="report-mode-select" style="border:1px solid #ddd8fe;border-radius:8px;padding:7px 10px;font-size:13px;"><option value="monthly" ${mode==='monthly'?'selected':''}>Monthly</option><option value="yearly" ${mode==='yearly'?'selected':''}>Yearly</option><option value="all" ${mode==='all'?'selected':''}>All Time</option></select>
    ${mode!=='all'?`<select id="report-year-select" style="border:1px solid #ddd8fe;border-radius:8px;padding:7px 10px;font-size:13px;">${years.map(y=>`<option value="${y}" ${selYear===y?'selected':''}>${y}</option>`).join('')}</select>`:''}
    ${mode==='monthly'?`<select id="report-month-select" style="border:1px solid #ddd8fe;border-radius:8px;padding:7px 10px;font-size:13px;">${mNames.map((m,i)=>`<option value="${i}" ${selMonth===i?'selected':''}>${m}</option>`).join('')}</select>`:''}
    <button id="print-financial-report" style="font-size:13px;background:#ede9fe;color:#6d28d9;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;">🖨️ Print</button>
  </div></div>
  <div class="card" style="margin-bottom:16px;" id="financial-report-area">
    <div style="text-align:center;border-bottom:1px solid #e2e8f0;padding-bottom:16px;margin-bottom:16px;">
      <h2 style="font-weight:700;font-size:16px;">Maagay 1 Phase 1-B Homeowners Association Inc.</h2>
      <p style="font-size:13px;color:#64748b;">Statement of Income, Expenses &amp; Balance</p>
      <p style="font-size:11px;color:#94a3b8;">${periodLabel} · Based on date received · Printed ${fmtDate(new Date())}</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      <div style="background:#f0fdf4;border-radius:8px;padding:12px;text-align:center;"><p style="font-size:11px;color:#059669;">💰 Income</p><p style="font-weight:700;color:#064e3b;">${peso(ti)}</p></div>
      <div style="background:#fff1f2;border-radius:8px;padding:12px;text-align:center;"><p style="font-size:11px;color:#e11d48;">🧾 Expenses</p><p style="font-weight:700;color:#9f1239;">${peso(te)}</p></div>
      <div style="background:#f5f3ff;border-radius:8px;padding:12px;text-align:center;"><p style="font-size:11px;color:#7c3aed;">📈 Balance</p><p style="font-weight:700;color:#5b21b6;">${peso(net)}</p></div>
    </div>
    <h3 style="font-weight:600;font-size:14px;margin-bottom:8px;">Income by Type</h3>
    <table style="margin-bottom:16px;"><thead><tr><th>Payment Type</th><th>Total</th></tr></thead><tbody>${ibt.map(x=>`<tr><td>${esc(x.name)}</td><td>${peso(x.total)}</td></tr>`).join('')||`<tr><td colspan="2" style="text-align:center;color:#94a3b8;">No income</td></tr>`}</tbody></table>

  </div>
  ${renderDuesGrid(years)}${renderMonthlyAmortization(years)}${renderReportSections()}`;
}

function renderDuesGrid(years){
  const gridYears=[2020,2021,2022,2023,2024,2025,2026];
  const target=state.duesAnnualTarget;
  const monthlyRate=target/12;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};
  active.forEach(h=>{totals[h.id]={};gridYears.forEach(y=>totals[h.id][y]=0);});
  state.payments.forEach(p=>{
    if(p.is_voided)return;
    if(duesType&&p.payment_type_id!==duesType.id)return;
    if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;
    if(!totals[p.homeowner_id])return;
    const alloc=allocateDues(p,monthlyRate);
    Object.entries(alloc).forEach(([y,amt])=>{const yr=parseInt(y);if(totals[p.homeowner_id][yr]!==undefined)totals[p.homeowner_id][yr]+=amt;});
  });
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=target?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  const collapsed=state.duesGridCollapsed;
  return`<div class="card" style="margin-bottom:16px;" id="dues-grid-area">
  <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;${collapsed?'':'margin-bottom:12px;'}" class="no-print">
    <div id="dues-grid-toggle" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 8px;margin:-4px -8px;border-radius:8px;" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='transparent'">
      <span style="font-size:16px;color:#059669;font-weight:700;transition:transform 0.15s;transform:rotate(${collapsed?'-90deg':'0deg'});display:inline-block;">▾</span>
      <div><h3 style="font-weight:600;font-size:14px;">🗓️ Monthly Dues — Yearly Collection Grid <span style="font-size:10px;font-weight:400;color:#94a3b8;">(click to ${collapsed?'expand':'collapse'})</span></h3><p style="font-size:11px;color:#64748b;">🟢 Fully paid &nbsp;🟡 Partial &nbsp;🔴 None</p></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;font-weight:600;color:#64748b;">Full year (₱):</label>
      <input type="number" id="dues-target-input" value="${target}" step="1" style="width:72px;border:1px solid #d1fae5;border-radius:6px;padding:6px;font-size:13px;">
      <button id="print-dues-grid" style="font-size:13px;background:#d1fae5;color:#064e3b;border:none;cursor:pointer;padding:7px 12px;border-radius:8px;">🖨️ Print</button>
    </div>
  </div>
  ${collapsed?'':`<div style="overflow-x:auto;max-height:420px;overflow-y:auto;">
  <table style="font-size:11px;">
    <thead style="position:sticky;top:0;z-index:2;">
      <tr>
        <th style="position:sticky;left:0;z-index:3;background:#f0fdf4;white-space:nowrap;">Name</th>
        <th style="background:#f0fdf4;">Blk/Lot</th>
        ${gridYears.map(y=>`<th style="background:#f0fdf4;text-align:center;">${y}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${active.map(h=>`<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1;font-weight:500;white-space:nowrap;padding:4px 8px;">${esc(h.name)}</td>
      <td style="padding:4px 8px;">${esc(h.block||'')}/${esc(h.lot||'')}</td>
      ${gridYears.map(y=>`<td style="${cs(totals[h.id][y])}padding:4px 8px;text-align:center;">${fmt(totals[h.id][y])}</td>`).join('')}
    </tr>`).join('')||`<tr><td colspan="${gridYears.length+2}" style="text-align:center;color:#94a3b8;padding:12px;">No active homeowners</td></tr>`}
    </tbody>
  </table></div>`}

function renderMonthlyAmortization(years){
  const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const target=state.duesAnnualTarget;
  const monthlyRate=target/12;
  const yr=state.monthlyAmortYear;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};
  active.forEach(h=>{totals[h.id]=new Array(12).fill(0);});
  state.payments.forEach(p=>{
    if(p.is_voided)return;
    if(duesType&&p.payment_type_id!==duesType.id)return;
    if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;
    if(!totals[p.homeowner_id])return;
    const alloc=allocateDuesByMonth(p,monthlyRate);
    Object.entries(alloc).forEach(([key,amt])=>{
      const[y,m]=key.split('-').map(Number);
      if(y===yr)totals[p.homeowner_id][m]+=amt;
    });
  });
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=monthlyRate?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  const collapsed=state.monthlyAmortCollapsed;
  const yearOptions=[...new Set([...years,yr])].sort((a,b)=>b-a);
  return`<div class="card" style="margin-bottom:16px;" id="monthly-amort-area">
  <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;${collapsed?'':'margin-bottom:12px;'}" class="no-print">
    <div id="monthly-amort-toggle" style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 8px;margin:-4px -8px;border-radius:8px;" onmouseover="this.style.background='#f0fdf4'" onmouseout="this.style.background='transparent'">
      <span style="font-size:16px;color:#059669;font-weight:700;transition:transform 0.15s;transform:rotate(${collapsed?'-90deg':'0deg'});display:inline-block;">▾</span>
      <div><h3 style="font-weight:600;font-size:14px;">🗓️ Monthly Amortization <span style="font-size:10px;font-weight:400;color:#94a3b8;">(click to ${collapsed?'expand':'collapse'})</span></h3><p style="font-size:11px;color:#64748b;">🟢 Fully paid &nbsp;🟡 Partial &nbsp;🔴 None &nbsp;·&nbsp; Per month = ${peso(monthlyRate)}</p></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;" class="no-print">
      <label style="font-size:11px;font-weight:600;color:#64748b;">Year:</label>
      <select id="monthly-amort-year-select" style="border:1px solid #d1fae5;border-radius:6px;padding:6px 8px;font-size:13px;">${yearOptions.map(y=>`<option value="${y}" ${y===yr?'selected':''}>${y}</option>`).join('')}</select>
      <button id="print-monthly-amort" style="font-size:13px;background:#d1fae5;color:#064e3b;border:none;cursor:pointer;padding:7px 12px;border-radius:8px;">🖨️ Print</button>
    </div>
  </div>
  ${collapsed?'':`<div style="overflow-x:auto;max-height:420px;overflow-y:auto;">
  <table style="font-size:11px;">
    <thead style="position:sticky;top:0;z-index:2;">
      <tr>
        <th style="position:sticky;left:0;z-index:3;background:#f0fdf4;white-space:nowrap;">Name</th>
        <th style="background:#f0fdf4;">Blk/Lot</th>
        ${mNames.map(m=>`<th style="background:#f0fdf4;text-align:center;">${m}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${active.map(h=>`<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1;font-weight:500;white-space:nowrap;padding:4px 8px;">${esc(h.name)}</td>
      <td style="padding:4px 8px;">${esc(h.block||'')}/${esc(h.lot||'')}</td>
      ${totals[h.id].map(v=>`<td style="${cs(v)}padding:4px 8px;text-align:center;">${fmt(v)}</td>`).join('')}
    </tr>`).join('')||`<tr><td colspan="14" style="text-align:center;color:#94a3b8;padding:12px;">No active homeowners</td></tr>`}
    </tbody>
  </table></div>`}
  </div>`;
}

function allocateDues(payment,monthlyRate){
  if(!payment.period_from&&!payment.period_to){
    const y=new Date(payment.payment_date).getFullYear();
    return{[y]:Number(payment.amount)};
  }
  const fromStr=(payment.period_from||payment.period_to).slice(0,7);
  const toStr=(payment.period_to||payment.period_from).slice(0,7);
  const from=new Date(fromStr+'-01');
  const to=new Date(toStr+'-01');
  const alloc={};
  const cur=new Date(from);
  let rem=Number(payment.amount);
  while(cur<=to&&rem>0){
    const y=cur.getFullYear();
    const chunk=Math.min(monthlyRate,rem);
    alloc[y]=(alloc[y]||0)+chunk;
    rem-=chunk;
    cur.setMonth(cur.getMonth()+1);
  }
  if(rem>0){const ly=to.getFullYear();alloc[ly]=(alloc[ly]||0)+rem;}
  return alloc;
}

// Like allocateDues, but keyed by 'YYYY-M' (month index 0-11) instead of just year.
function allocateDuesByMonth(payment,monthlyRate){
  if(!payment.period_from&&!payment.period_to){
    const d=new Date(payment.payment_date);
    return{[`${d.getFullYear()}-${d.getMonth()}`]:Number(payment.amount)};
  }
  const fromStr=(payment.period_from||payment.period_to).slice(0,7);
  const toStr=(payment.period_to||payment.period_from).slice(0,7);
  const from=new Date(fromStr+'-01');
  const to=new Date(toStr+'-01');
  const alloc={};
  const cur=new Date(from);
  let rem=Number(payment.amount);
  while(cur<=to&&rem>0){
    const key=`${cur.getFullYear()}-${cur.getMonth()}`;
    const chunk=Math.min(monthlyRate,rem);
    alloc[key]=(alloc[key]||0)+chunk;
    rem-=chunk;
    cur.setMonth(cur.getMonth()+1);
  }
  if(rem>0){const key=`${to.getFullYear()}-${to.getMonth()}`;alloc[key]=(alloc[key]||0)+rem;}
  return alloc;
}

// MODAL HELPERS
function showModal(id){const m=document.getElementById(id);if(m){m.style.display='flex';}}
function hideModal(id){const m=document.getElementById(id);if(m){m.style.display='none';}}

// OPEN MODALS
function openHoModal(ho){
  showModal('homeowner-modal');
  document.getElementById('ho-modal-title').textContent=ho?'Edit Homeowner':'Add Homeowner';
  document.getElementById('ho-id').value=ho?.id||'';
  document.getElementById('ho-first-name').value=ho?.first_name||'';
  document.getElementById('ho-middle-name').value=ho?.middle_name||'';
  document.getElementById('ho-last-name').value=ho?.last_name||'';
  document.getElementById('ho-name').value=ho?.name||'';
  document.getElementById('ho-name').dataset.userEdited=ho?'true':'';
  document.getElementById('ho-block').value=ho?.block||'';
  document.getElementById('ho-lot').value=ho?.lot||'';
  document.getElementById('ho-area').value=ho?.area||'';
  document.getElementById('ho-dob').value=ho?.date_of_birth||'';
  document.getElementById('ho-income').value=ho?.monthly_income||'';
  document.getElementById('ho-email').value=ho?.email||'';
  document.getElementById('ho-status').value=ho?.status||'active';
}
function openPayModal(p){
  showModal('payment-modal');
  document.getElementById('pay-modal-title').textContent=p?'Edit Payment':'Log Payment';
  document.getElementById('pay-id').value=p?.id||'';
  document.getElementById('pay-homeowner').value=p?.homeowner_id||'';
  if(p?.homeowner_id){const h=state.homeowners.find(x=>x.id===p.homeowner_id);document.getElementById('pay-homeowner-search').value=h?`${h.name} (Blk ${h.block||'-'} Lot ${h.lot||'-'})`:'';} else{document.getElementById('pay-homeowner-search').value='';}
  document.getElementById('pay-type').value=p?.payment_type_id||'';
  document.getElementById('pay-or').value=p?.or_number||'';
  document.getElementById('pay-amount').value=p?.amount||'';
  document.getElementById('pay-date').value=p?.payment_date||new Date().toISOString().slice(0,10);
  document.getElementById('pay-period-from').value=p?.period_from?p.period_from.slice(0,7):'';
  document.getElementById('pay-period-to').value=p?.period_to?p.period_to.slice(0,7):'';
  document.getElementById('pay-is-waived').checked=p?.is_waived||false;
  document.getElementById('pay-remarks').value=p?.remarks||'';
}
function openExpModal(ex){
  showModal('expense-modal');
  document.getElementById('exp-modal-title').textContent=ex?'Edit Expense':'Add Expense';
  document.getElementById('exp-id').value=ex?.id||'';
  document.getElementById('exp-category').value=ex?.category_id||'';
  document.getElementById('exp-description').value=ex?.description||'';
  document.getElementById('exp-amount').value=ex?.amount||'';
  document.getElementById('exp-date').value=ex?.expense_date||new Date().toISOString().slice(0,10);
  document.getElementById('exp-receipt').value=ex?.receipt_ref||'';
}

// PRINT FUNCTIONS
function printStatement(id){
  const ho=state.homeowners.find(h=>h.id===id);
  const pays=state.payments.filter(p=>p.homeowner_id===id);
  const total=pays.filter(isValidIncome).reduce((s,p)=>s+Number(p.amount),0);
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Statement</title><style>body{font-family:Arial,sans-serif;padding:30px;color:#1e293b;}table{width:100%;border-collapse:collapse;margin-top:14px;}th,td{border:1px solid #cbd5e1;padding:7px;font-size:12px;}th{background:#f1f5f9;}</style></head><body>
  <h2>Maagay 1 Phase 1-B Homeowners Association Inc.</h2>
  <h3>Statement of Account</h3>
  <p><b>${esc(ho.name)}</b><br>Block ${esc(ho.block||'-')}, Lot ${esc(ho.lot||'-')} · ${esc(ho.area||'-')} sqm${ho.date_of_birth?`<br>Date of Birth: ${fmtDate(ho.date_of_birth)}`:''}${ho.email?`<br>${esc(ho.email)}`:''}</p>
  <table><thead><tr><th>Date</th><th>OR #</th><th>Type</th><th>Period</th><th>Amount</th><th>Remarks</th></tr></thead>
  <tbody>${pays.map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${esc(p.or_number)}</td><td>${esc(p.payment_types?.name||'')}</td><td>${fmtPeriod(p)||'—'}</td><td>${peso(p.amount)}</td><td>${esc(p.remarks||'')}${p.is_voided?' (VOIDED)':p.is_waived?' (WAIVED — excluded from total)':''}</td></tr>`).join('')}</tbody></table>
  <p style="margin-top:12px;font-weight:bold;">Total Paid: ${peso(total)}</p>

function printDuesGrid(){
  const gridYears=[2020,2021,2022,2023,2024,2025,2026];
  const target=state.duesAnnualTarget;const mr=target/12;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};active.forEach(h=>{totals[h.id]={};gridYears.forEach(y=>totals[h.id][y]=0);});
  state.payments.forEach(p=>{
    if(p.is_voided)return; // voided = doesn't count at all
    // waived counts toward coverage in the dues grid (period is covered)
    // but is excluded from cash income in financial reports
    if(duesType&&p.payment_type_id!==duesType.id)return;
    if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;
    if(!totals[p.homeowner_id])return;
    const al=allocateDues(p,mr);
    Object.entries(al).forEach(([y,a])=>{const yr=parseInt(y);if(totals[p.homeowner_id][yr]!==undefined)totals[p.homeowner_id][yr]+=a;});
  });
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=target?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Dues Grid</title><style>@page{size:8.5in 13in landscape;margin:0.4in;}body{font-family:Arial,sans-serif;padding:10px;color:#1e293b;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #cbd5e1;padding:5px 7px;font-size:10px;}th{background:#f1f5f9;text-align:center;}.legend{display:flex;gap:14px;margin-top:10px;font-size:10px;}.swatch{display:inline-block;width:10px;height:10px;margin-right:3px;vertical-align:middle;}</style></head><body>
  <h2 style="font-size:15px;">Maagay 1 Phase 1-B HOA — Monthly Dues Collection Grid</h2>
  <p style="font-size:11px;color:#64748b;">Full year = ${peso(target)}</p>
  <table><thead><tr><th style="text-align:left;">Name</th><th>Blk/Lot</th>${gridYears.map(y=>`<th>${y}</th>`).join('')}</tr></thead>
  <tbody>${active.map(h=>`<tr><td style="text-align:left;">${esc(h.name)}</td><td>${esc(h.block||'')}/${esc(h.lot||'')}</td>${gridYears.map(y=>`<td style="${cs(totals[h.id][y])}text-align:center;">${fmt(totals[h.id][y])}</td>`).join('')}</tr>`).join('')}</tbody></table>
  <div class="legend"><span><span class="swatch" style="background:#dcfce7;"></span>Fully Paid</span><span><span class="swatch" style="background:#fef9c3;"></span>Partial</span><span><span class="swatch" style="background:#fff5f5;"></span>None</span></div>
  <p style="font-size:10px;color:#94a3b8;margin-top:16px;">Generated ${fmtDate(new Date())}</p>
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}

function printMonthlyAmort(){
  const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const target=state.duesAnnualTarget;const mr=target/12;
  const yr=state.monthlyAmortYear;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};active.forEach(h=>{totals[h.id]=new Array(12).fill(0);});
  state.payments.forEach(p=>{
    if(p.is_voided)return;
    if(duesType&&p.payment_type_id!==duesType.id)return;
    if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;
    if(!totals[p.homeowner_id])return;
    const al=allocateDuesByMonth(p,mr);
    Object.entries(al).forEach(([key,a])=>{const[y,m]=key.split('-').map(Number);if(y===yr)totals[p.homeowner_id][m]+=a;});
  });
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=mr?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Monthly Amortization</title><style>@page{size:8.5in 13in landscape;margin:0.4in;}body{font-family:Arial,sans-serif;padding:10px;color:#1e293b;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #cbd5e1;padding:5px 7px;font-size:10px;}th{background:#f1f5f9;text-align:center;}.legend{display:flex;gap:14px;margin-top:10px;font-size:10px;}.swatch{display:inline-block;width:10px;height:10px;margin-right:3px;vertical-align:middle;}</style></head><body>
  <h2 style="font-size:15px;">Maagay 1 Phase 1-B HOA — Monthly Amortization — ${yr}</h2>
  <p style="font-size:11px;color:#64748b;">Per month = ${peso(mr)}</p>
  <table><thead><tr><th style="text-align:left;">Name</th><th>Blk/Lot</th>${mNames.map(m=>`<th>${m}</th>`).join('')}</tr></thead>
  <tbody>${active.map(h=>`<tr><td style="text-align:left;">${esc(h.name)}</td><td>${esc(h.block||'')}/${esc(h.lot||'')}</td>${totals[h.id].map(v=>`<td style="${cs(v)}text-align:center;">${fmt(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>
  <div class="legend"><span><span class="swatch" style="background:#dcfce7;"></span>Fully Paid</span><span><span class="swatch" style="background:#fef9c3;"></span>Partial</span><span><span class="swatch" style="background:#fff5f5;"></span>None</span></div>
  <p style="font-size:10px;color:#94a3b8;margin-top:16px;">Generated ${fmtDate(new Date())}</p>
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}
