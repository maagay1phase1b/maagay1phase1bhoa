let state = {
  currentUser: null,   // { type: 'staff', role, username, id } OR { type: 'member', homeowner }

const root = document.getElementById('app');

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

function toast(msg, isError = false) {
  setState({ toast: { msg, isError } });
  setTimeout(() => setState({ toast: null }), 3000);
}

function peso(n) {
  return 'PHP ' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
}

function fmtMonthYear(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'short' });
}

function fmtPeriod(p) {
  if (!p.period_from && !p.period_to) return '';
  if (p.period_from && p.period_to) {
    const from = fmtMonthYear(p.period_from);
    const to = fmtMonthYear(p.period_to);
    return from === to ? from : `${from} – ${to}`;
  }
  return fmtMonthYear(p.period_from || p.period_to);
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =====================================================================
// AUTH (simplified — no Supabase Auth sessions, just direct checks)
// =====================================================================
async function loginStaff(username, password) {
  const { data, error } = await sb.rpc('verify_app_user', { p_username: username, p_password: password });
  if (error) {
    toast('Login error: ' + error.message, true);
    return;
  }
  if (!data || data.length === 0) {
    toast('Incorrect username or password, or account is inactive.', true);
    return;
  }
  const user = data[0];
  setState({ currentUser: { type: 'staff', id: user.id, username: user.username, role: user.role, fullName: user.full_name }, view: 'dashboard' });
  await loadAllData();
}

async function loginMember(email) {
  const { data, error } = await sb.from('homeowners').select('*').eq('email', email.trim()).maybeSingle();
  if (error) {
    toast('Login error: ' + error.message, true);
    return;
  }
  if (!data) {
    toast('No homeowner record found with that email. Contact the HOA admin.', true);
    return;
  }
  setState({ currentUser: { type: 'member', homeowner: data }, view: 'member-dashboard' });
  await loadAllData();
}

function logout() {
  setState({ currentUser: null, view: 'login', homeowners: [], payments: [], expenses: [] });
}

// =====================================================================
// DATA LOADING
// =====================================================================
async function loadAllData() {
  if (!state.currentUser) return;

  if (state.currentUser.type === 'staff') {
    const [hRes, ptRes, pRes, ecRes, eRes] = await Promise.all([
      sb.from('homeowners').select('*').order('block').order('lot'),
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, homeowners(name,block,lot), payment_types(name)').order('payment_date', { ascending: false }),
      sb.from('expense_categories').select('*').order('sort_order'),
      sb.from('expenses').select('*, expense_categories(name)').order('expense_date', { ascending: false }),
    ]);
    setState({
      homeowners: hRes.data || [],
      paymentTypes: ptRes.data || [],
      payments: pRes.data || [],
      expenseCategories: ecRes.data || [],
      expenses: eRes.data || [],
    });
  } else if (state.currentUser.type === 'member') {
    const homeownerId = state.currentUser.homeowner.id;
    const [ptRes, pRes] = await Promise.all([
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, payment_types(name)').eq('homeowner_id', homeownerId).order('payment_date', { ascending: false }),
    ]);
    setState({
      paymentTypes: ptRes.data || [],
      payments: pRes.data || [],
      homeowners: [state.currentUser.homeowner],
    });
  }
}

function balanceFor(homeownerId) {
  const total = state.payments
    .filter(p => p.homeowner_id === homeownerId && !p.is_voided)
    .reduce((sum, p) => sum + Number(p.amount), 0);
  return total;
}

function isDuesUpdated(homeownerId) {
  const threeMonthsAgo = new Date();
  threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
  return state.payments.some(p => {
    if (p.homeowner_id !== homeownerId || p.is_voided) return false;
    const typeName = (p.payment_types?.name || '').toLowerCase();
    if (!typeName.includes('monthly dues')) return false;
    const coverDate = p.period_to || p.period_from || p.payment_date;
    return new Date(coverDate) >= threeMonthsAgo;
  });
}

async function loadAdminUsers() {
  const { data, error } = await sb.rpc('list_app_users');
  if (error) {
    toast('Could not load admin accounts: ' + error.message, true);
    return;
  }
  setState({ adminUsers: data || [] });
}

// =====================================================================
// RENDER — ROUTER
// =====================================================================
function render() {
  if (state.loading) {
    root.innerHTML = `<div class="flex items-center justify-center h-screen"><div class="spinner"></div></div>`;
    return;
  }

  let html = '';
  if (!state.currentUser) html = renderLogin();
  else if (state.currentUser.type === 'member') html = renderMemberDashboard();
  else html = renderStaffShell();

  root.innerHTML = `
    ${html}
    ${state.toast ? `<div class="fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-lg text-white text-sm no-print ${state.toast.isError ? 'bg-red-600' : 'bg-emerald-600'}">${escapeHtml(state.toast.msg)}</div>` : ''}
  `;
  attachHandlers();
  if (state.currentUser && state.currentUser.type !== 'member' && state.view === 'dashboard') {
    setTimeout(renderDashboardCharts, 0);
  }
}

      </tbody>

let incomeChartInstance = null;
let expenseChartInstance = null;

function renderDashboardCharts() {
  const incomeCanvas = document.getElementById('income-chart');
  const expenseCanvas = document.getElementById('expense-chart');
  if (!incomeCanvas || !expenseCanvas || typeof Chart === 'undefined') return;

  const currentYear = new Date().getFullYear();
  const monthLabels = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const incomeByMonth = new Array(12).fill(0);
  state.payments.forEach(p => {
    if (p.is_voided) return;
    const d = new Date(p.payment_date);
    if (d.getFullYear() === currentYear) incomeByMonth[d.getMonth()] += Number(p.amount);
  });

  const expenseByMonth = new Array(12).fill(0);
  state.expenses.forEach(e => {
    const d = new Date(e.expense_date);
    if (d.getFullYear() === currentYear) expenseByMonth[d.getMonth()] += Number(e.amount);
  });

  if (incomeChartInstance) incomeChartInstance.destroy();
  if (expenseChartInstance) expenseChartInstance.destroy();

  incomeChartInstance = new Chart(incomeCanvas, {
    type: 'line',
    data: {
      labels: monthLabels,
      datasets: [{
        label: 'Collections',
        data: incomeByMonth,
        borderColor: '#10b981',
        backgroundColor: 'rgba(16,185,129,0.12)',
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#10b981',
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => 'PHP ' + v.toLocaleString() } } }
    }
  });

  expenseChartInstance = new Chart(expenseCanvas, {
    type: 'line',
    data: {
      labels: monthLabels,
      datasets: [{
        label: 'Expenses',
        data: expenseByMonth,
        borderColor: '#f43f5e',
        backgroundColor: 'rgba(244,63,94,0.12)',
        tension: 0.3,
        fill: true,
        pointBackgroundColor: '#f43f5e',
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { callback: v => 'PHP ' + v.toLocaleString() } } }
    }
  });
}

// ---------------- REPORTS ----------------
function renderReports() {
  const allYears = new Set();
  state.payments.forEach(p => allYears.add(new Date(p.payment_date).getFullYear()));
  state.expenses.forEach(e => allYears.add(new Date(e.expense_date).getFullYear()));
  allYears.add(new Date().getFullYear());
  const years = [...allYears].sort((a,b) => b - a);

  const mode = state.reportMode;
  const selectedYear = state.reportYear === 'all' ? new Date().getFullYear() : state.reportYear;
  const selectedMonth = state.reportMonth;
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  // IMPORTANT: filtering always uses the date the payment/expense was actually
  // recorded (payment_date / expense_date) — never period_from/period_to,
  // which only describe what the payment covers, not when it was received.
  let yearPayments, yearExpenses, periodLabel;

  if (mode === 'all') {
    yearPayments = state.payments;
    yearExpenses = state.expenses;
    periodLabel = 'All Time';
  } else if (mode === 'monthly') {
    yearPayments = state.payments.filter(p => {
      const d = new Date(p.payment_date);
      return d.getFullYear() === selectedYear && d.getMonth() === selectedMonth;
    });
    yearExpenses = state.expenses.filter(e => {
      const d = new Date(e.expense_date);
      return d.getFullYear() === selectedYear && d.getMonth() === selectedMonth;
    });
    periodLabel = `${monthNames[selectedMonth]} ${selectedYear}`;
  } else {
    yearPayments = state.payments.filter(p => new Date(p.payment_date).getFullYear() === selectedYear);
    yearExpenses = state.expenses.filter(e => new Date(e.expense_date).getFullYear() === selectedYear);
    periodLabel = `Year ${selectedYear}`;
  }

  const totalIncome = yearPayments.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const totalExpense = yearExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const net = totalIncome - totalExpense;

  const incomeByType = state.paymentTypes.map(t=>({
    name: t.name,
    total: yearPayments.filter(p=>p.payment_type_id===t.id && !p.is_voided).reduce((s,p)=>s+Number(p.amount),0)
  })).filter(x=>x.total>0);

  const expenseByCat = state.expenseCategories.map(c=>({
    name: c.name,
    total: yearExpenses.filter(e=>e.category_id===c.id).reduce((s,e)=>s+Number(e.amount),0)
  })).filter(x=>x.total>0);

  return `
  <div class="flex flex-wrap justify-between items-center gap-3 mb-6 no-print">
    <h1 class="text-xl font-bold text-slate-800">📈 Financial Report</h1>
    <div class="flex flex-wrap items-center gap-2">
      <select id="report-mode-select" class="border border-violet-200 rounded-lg px-3 py-2 text-sm">
        <option value="monthly" ${mode==='monthly'?'selected':''}>Monthly</option>
        <option value="yearly" ${mode==='yearly'?'selected':''}>Yearly</option>
        <option value="all" ${mode==='all'?'selected':''}>All Time</option>
      </select>
      ${mode !== 'all' ? `
        <select id="report-year-select" class="border border-violet-200 rounded-lg px-3 py-2 text-sm">
          ${years.map(y => `<option value="${y}" ${selectedYear===y?'selected':''}>${y}</option>`).join('')}
        </select>
      ` : ''}
      ${mode === 'monthly' ? `
        <select id="report-month-select" class="border border-violet-200 rounded-lg px-3 py-2 text-sm">
          ${monthNames.map((m,i) => `<option value="${i}" ${selectedMonth===i?'selected':''}>${m}</option>`).join('')}
        </select>
      ` : ''}
      <button id="print-financial-report" class="text-sm bg-violet-100 hover:bg-violet-200 text-violet-700 px-3 py-2 rounded-lg font-medium">🖨️ Print / PDF</button>
    </div>
  </div>
  <div id="financial-report-area" class="bg-white rounded-xl shadow card-pop p-6 space-y-6 border border-violet-100">
    <div class="text-center border-b pb-4">
      <h2 class="font-bold text-lg">Maagay 1 Phase 1-B Homeowners Association Inc.</h2>
      <p class="text-sm text-slate-500">Statement of Income, Expenses &amp; Balance</p>
      <p class="text-xs text-slate-400">${periodLabel} &middot; Based on date received &middot; Printed ${fmtDate(new Date())}</p>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div class="bg-gradient-to-br from-emerald-50 to-emerald-100 rounded-lg p-4 text-center border border-emerald-200"><p class="text-xs text-emerald-700">💰 Total Income</p><p class="text-xl font-bold text-emerald-800">${peso(totalIncome)}</p></div>
      <div class="bg-gradient-to-br from-rose-50 to-rose-100 rounded-lg p-4 text-center border border-rose-200"><p class="text-xs text-rose-700">🧾 Total Expenses</p><p class="text-xl font-bold text-rose-800">${peso(totalExpense)}</p></div>
      <div class="bg-gradient-to-br from-violet-50 to-violet-100 rounded-lg p-4 text-center border border-violet-200"><p class="text-xs text-violet-700">📈 Net Balance</p><p class="text-xl font-bold text-violet-800">${peso(net)}</p></div>
    </div>

    <div>
      <h3 class="font-semibold text-slate-700 mb-2">Income by Payment Type</h3>
      <table><thead><tr><th>Payment Type</th><th>Total Collected</th></tr></thead>
      <tbody>${incomeByType.map(x=>`<tr><td>${escapeHtml(x.name)}</td><td>${peso(x.total)}</td></tr>`).join('') || `<tr><td colspan="2" class="text-center text-slate-400">No income recorded</td></tr>`}</tbody></table>
    </div>

    <div>
      <h3 class="font-semibold text-slate-700 mb-2">Expenses by Category</h3>
      <table><thead><tr><th>Category</th><th>Total Spent</th></tr></thead>
      <tbody>${expenseByCat.map(x=>`<tr><td>${escapeHtml(x.name)}</td><td>${peso(x.total)}</td></tr>`).join('') || `<tr><td colspan="2" class="text-center text-slate-400">No expenses recorded</td></tr>`}</tbody></table>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
    <div class="bg-white rounded-xl shadow card-pop p-5 border border-violet-100">
      <h3 class="font-semibold text-slate-700 mb-1">👤 Member Statement(s)</h3>
      <p class="text-xs text-slate-500 mb-3">Print full payment history for one or more chosen homeowners.</p>
      <div class="relative mb-2">
        <input type="text" id="report-member-search" placeholder="Search by name..." value="${escapeHtml(state.reportMemberSearch)}"
          class="w-full border border-violet-200 rounded-lg px-3 py-2 text-sm">
        <div id="report-member-results" class="hidden absolute z-10 bg-white border border-slate-200 rounded-lg shadow-lg mt-1 w-full max-h-40 overflow-y-auto"></div>
      </div>
      <div id="report-member-chips" class="flex flex-wrap gap-1 mb-3">
        ${state.reportSelectedMembers.map(id => {
          const h = state.homeowners.find(x => x.id === id);
          return h ? `<span class="text-xs bg-violet-100 text-violet-700 px-2 py-1 rounded-full flex items-center gap-1">${escapeHtml(h.name)} <button data-remove-report-member="${id}" class="hover:text-violet-900 font-bold">×</button></span>` : '';
        }).join('') || `<span class="text-xs text-slate-400">No members selected yet</span>`}
      </div>
      <button id="print-member-statements" class="w-full text-white py-2 rounded-lg text-sm font-medium" style="background:linear-gradient(to right,#a78bfa,#8b5cf6);">🖨️ Print Selected</button>
    </div>

    <div class="bg-white rounded-xl shadow card-pop p-5 border border-amber-100">
      <h3 class="font-semibold text-slate-700 mb-1">💵 By Payment Type</h3>
      <p class="text-xs text-slate-500 mb-3">Print all payment records for one or more chosen payment types.</p>
      <div class="space-y-1 mb-3 max-h-40 overflow-y-auto border border-amber-100 rounded-lg p-2">
        ${state.paymentTypes.map(t => `
          <label class="flex items-center gap-2 text-sm text-slate-700">
            <input type="checkbox" data-report-type-checkbox="${t.id}" ${state.reportSelectedTypes.includes(t.id)?'checked':''}>
            ${escapeHtml(t.name)}
          </label>
        `).join('')}
      </div>
      <button id="print-type-report" class="w-full text-white py-2 rounded-lg text-sm font-medium" style="background:linear-gradient(to right,#fbbf24,#f59e0b);">🖨️ Print Selected Types</button>
    </div>
  </div>

  <div class="bg-white rounded-xl shadow card-pop p-5 border border-rose-100 mt-4">
    <h3 class="font-semibold text-slate-700 mb-1">📋 Payment Ranking — Who's Paying, Who's Not</h3>
    <p class="text-xs text-slate-500 mb-3">Lists every homeowner's total paid per payment type, sorted highest to lowest, to spot non-payers at a glance.</p>
    <button id="print-ranking-report" class="text-white px-4 py-2 rounded-lg text-sm font-medium" style="background:linear-gradient(to right,#fb7185,#e11d48);">🖨️ Print Ranking Report</button>
  </div>`;
}

// =====================================================================
// EVENT HANDLERS
// =====================================================================
function attachHandlers() {
  // ---- LOGIN MODE TOGGLE ----
  const modeStaff = document.getElementById('mode-staff');
  if (modeStaff) modeStaff.onclick = () => setState({ loginMode: 'staff' });
  const modeMember = document.getElementById('mode-member');
  if (modeMember) modeMember.onclick = () => setState({ loginMode: 'member' });

  // ---- STAFF LOGIN ----
  const staffForm = document.getElementById('staff-login-form');
  if (staffForm) {
    staffForm.onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('staff-username').value.trim();
      const password = document.getElementById('staff-password').value;
      await loginStaff(username, password);
    };
  }

  // ---- MEMBER LOGIN ----
  const memberForm = document.getElementById('member-login-form');
  if (memberForm) {
    memberForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('member-email').value.trim();
      await loginMember(email);
    };
  }

  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.onclick = logout;

  // ---- CHANGE CREDENTIALS ----
  const changeCredsBtn = document.getElementById('change-creds-btn');
  if (changeCredsBtn) {
    changeCredsBtn.onclick = () => {
      document.getElementById('creds-modal').classList.remove('hidden');
    };
  }

  const credsCancel = document.getElementById('creds-cancel');
  if (credsCancel) credsCancel.onclick = () => document.getElementById('creds-modal').classList.add('hidden');

  const credsForm = document.getElementById('creds-form');
  if (credsForm) {
    credsForm.onsubmit = async (e) => {
      e.preventDefault();
      const currentUsername = document.getElementById('creds-current-username').value.trim();
      const currentPassword = document.getElementById('creds-current-password').value;
      const newUsername = document.getElementById('creds-new-username').value.trim();
      const newPassword = document.getElementById('creds-new-password').value;
      const msgEl = document.getElementById('creds-msg');

      msgEl.textContent = 'Saving...';
      msgEl.className = 'text-sm mb-3 text-slate-500';

      const { data, error } = await sb.rpc('change_app_user_credentials', {
        p_current_username: currentUsername,
        p_current_password: currentPassword,
        p_new_username: newUsername,
        p_new_password: newPassword,
      });

      if (error) {
        msgEl.textContent = 'Error: ' + error.message;
        msgEl.className = 'text-sm mb-3 text-red-600';
        return;
      }

      if (!data) {
        msgEl.textContent = 'Current username or password is incorrect.';
        msgEl.className = 'text-sm mb-3 text-red-600';
        return;
      }

      toast('Login credentials updated. Please log in again.');
      document.getElementById('creds-modal').classList.add('hidden');
      logout();
    };
  }

  // ---- MANAGE ADMINS ----
  const manageAdminsBtn = document.getElementById('manage-admins-btn');
  if (manageAdminsBtn) {
    manageAdminsBtn.onclick = async () => {
      await loadAdminUsers();
      document.getElementById('admins-modal').classList.remove('hidden');
    };
  }

  const adminsClose = document.getElementById('admins-close');
  if (adminsClose) adminsClose.onclick = () => document.getElementById('admins-modal').classList.add('hidden');

  document.querySelectorAll('[data-edit-admin]').forEach(btn => {
    btn.onclick = () => {
      const u = state.adminUsers.find(x => x.id === btn.dataset.editAdmin);
      if (!u) return;
      document.getElementById('edit-admin-id').value = u.id;
      document.getElementById('edit-admin-fullname').value = u.full_name || '';
      document.getElementById('edit-admin-username').value = u.username;
      document.getElementById('edit-admin-role').value = u.role;
      document.getElementById('edit-admin-active').checked = u.is_active;
      document.getElementById('edit-admin-password').value = '';
      document.getElementById('edit-admin-msg').textContent = '';
      document.getElementById('admins-modal').classList.add('hidden');
      document.getElementById('edit-admin-modal').classList.remove('hidden');
    };
  });

  const editAdminCancel = document.getElementById('edit-admin-cancel');
  if (editAdminCancel) {
    editAdminCancel.onclick = () => {
      document.getElementById('edit-admin-modal').classList.add('hidden');
      document.getElementById('admins-modal').classList.remove('hidden');
    };
  }

  const editAdminDelete = document.getElementById('edit-admin-delete');
  if (editAdminDelete) {
    editAdminDelete.onclick = async () => {
      const id = document.getElementById('edit-admin-id').value;
      if (id === state.currentUser.id) {
        toast("You can't remove your own account while logged in.", true);
        return;
      }
      if (!confirm('Remove this staff account? This cannot be undone.')) return;
      const { error } = await sb.rpc('delete_app_user', { p_id: id });
      if (error) return toast(error.message, true);
      toast('Account removed');
      document.getElementById('edit-admin-modal').classList.add('hidden');
      await loadAdminUsers();
      document.getElementById('admins-modal').classList.remove('hidden');
    };
  }

  const editAdminForm = document.getElementById('edit-admin-form');
  if (editAdminForm) {
    editAdminForm.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-admin-id').value;
      const fullName = document.getElementById('edit-admin-fullname').value.trim();
      const username = document.getElementById('edit-admin-username').value.trim();
      const role = document.getElementById('edit-admin-role').value;
      const isActive = document.getElementById('edit-admin-active').checked;
      const newPassword = document.getElementById('edit-admin-password').value;
      const msgEl = document.getElementById('edit-admin-msg');

      const { error: updateErr } = await sb.rpc('admin_update_app_user', {
        p_id: id, p_username: username, p_full_name: fullName, p_role: role,
        p_new_password: newPassword || null,
      });
      if (updateErr) {
        msgEl.textContent = updateErr.message.includes('duplicate') ? 'That username is already taken.' : 'Error: ' + updateErr.message;
        msgEl.className = 'text-sm mb-3 text-red-600';
        return;
      }

      const { error: activeErr } = await sb.rpc('set_app_user_active', { p_id: id, p_is_active: isActive });
      if (activeErr) {
        msgEl.textContent = 'Error updating status: ' + activeErr.message;
        msgEl.className = 'text-sm mb-3 text-red-600';
        return;
      }

      toast('Staff account updated');
      document.getElementById('edit-admin-modal').classList.add('hidden');
      if (id === state.currentUser.id) {
        setState({ currentUser: { ...state.currentUser, username, role } });
      }
      await loadAdminUsers();
      document.getElementById('admins-modal').classList.remove('hidden');
    };
  }

  const addAdminForm = document.getElementById('add-admin-form');
  if (addAdminForm) {
    addAdminForm.onsubmit = async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('new-admin-fullname').value.trim();
      const username = document.getElementById('new-admin-username').value.trim();
      const password = document.getElementById('new-admin-password').value;
      const role = document.getElementById('new-admin-role').value;
      const msgEl = document.getElementById('admins-msg');

      const { error } = await sb.rpc('create_app_user', { p_username: username, p_password: password, p_role: role, p_full_name: fullName });
      if (error) {
        msgEl.textContent = error.message.includes('duplicate') || error.message.includes('unique')
          ? 'That username is already taken.'
          : 'Error: ' + error.message;
        msgEl.className = 'text-sm mb-2 text-red-600';
        return;
      }
      msgEl.textContent = 'Account created.';
      msgEl.className = 'text-sm mb-2 text-emerald-600';
      addAdminForm.reset();
      await loadAdminUsers();
      document.getElementById('admins-modal').classList.remove('hidden');
    };
  }

  // ---- NAV ----
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.onclick = () => setState({ view: btn.dataset.nav, mobileSidebarOpen: false });
  });

  // ---- MOBILE SIDEBAR TOGGLE ----
  const sidebarOpenBtn = document.getElementById('sidebar-open-btn');

  const hoForm = document.getElementById('homeowner-form');

      const last = document.getElementById('ho-last-name').value.trim();
      const nameField = document.getElementById('ho-name');

    hoForm.onsubmit = async (e) => {
      e.preventDefault();

        last_name: document.getElementById('ho-last-name').value.trim() || null,

        status: document.getElementById('ho-status').value,

      if (id) {
        ({ error } = await sb.from('homeowners').update(payload).eq('id', id));
      } else {
        ({ error } = await sb.from('homeowners').insert(payload));
      }
      if (error) return toast(error.message, true);
      toast('Homeowner saved');
      document.getElementById('homeowner-modal').classList.add('hidden');
      await loadAllData();
      render();

    const resultsBox = document.getElementById('pay-homeowner-results');
    payHoSearch.oninput = () => {
      const q = payHoSearch.value.trim().toLowerCase();
      document.getElementById('pay-homeowner').value = '';
      if (!q) { resultsBox.classList.add('hidden'); resultsBox.innerHTML = ''; return; }
      const matches = state.homeowners.filter(h => (h.name||'').toLowerCase().includes(q)).slice(0, 20);
      if (matches.length === 0) {
        resultsBox.innerHTML = `<div class="px-3 py-2 text-sm text-slate-400">No matches found.</div>`;
      } else {

          <button type="button" data-pick-homeowner="${h.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-blue-50 block">
            ${escapeHtml(h.name)} <span class="text-xs text-slate-400">(Blk ${escapeHtml(h.block||'-')} Lot ${escapeHtml(h.lot||'-')})</span>
          </button>
        `).join('');
        resultsBox.querySelectorAll('[data-pick-homeowner]').forEach(btn => {
          btn.onclick = () => {
            const ho = state.homeowners.find(h => h.id === btn.dataset.pickHomeowner);
            document.getElementById('pay-homeowner').value = ho.id;
            payHoSearch.value = `${ho.name} (Blk ${ho.block||'-'} Lot ${ho.lot||'-'})`;

  document.querySelectorAll('[data-edit-payment]').forEach(btn => {

  document.querySelectorAll('[data-void-payment]').forEach(btn => {
    btn.onclick = async () => {
      const p = state.payments.find(x => x.id === btn.dataset.voidPayment);
      const { error } = await sb.from('payments').update({ is_voided: !p.is_voided }).eq('id', p.id);
      if (error) return toast(error.message, true);
      toast(p.is_voided ? 'Payment unvoided' : 'Payment voided');
      await loadAllData();
      render();
    };
  });

  document.querySelectorAll('[data-delete-payment]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Delete this payment record permanently?')) return;
      const { error } = await sb.from('payments').delete().eq('id', btn.dataset.deletePayment);
      if (error) return toast(error.message, true);
      toast('Payment deleted');
      await loadAllData();
      render();
    };
  });

  // ---- PAYMENT SORT ----
  document.querySelectorAll('[data-pay-sort]').forEach(btn => {
    btn.onclick = () => {
      const field = btn.dataset.paySort;
      const current = state.paymentSort;
      let dir = 'asc';
      if (current.field === field) dir = current.dir === 'asc' ? 'desc' : 'asc';
      setState({ paymentSort: { field, dir } });
    };
  });

  // ---- PAYMENT SEARCH/FILTER ----
  const paymentSearch = document.getElementById('payment-search');
  if (paymentSearch) {
    paymentSearch.oninput = () => {
      const cursorPos = paymentSearch.selectionStart;
      setState({ paymentFilter: { ...state.paymentFilter, search: paymentSearch.value } });
      const refreshed = document.getElementById('payment-search');
      if (refreshed) {
        refreshed.focus();
        refreshed.setSelectionRange(cursorPos, cursorPos);
      }
    };
  }
  const paymentTypeFilter = document.getElementById('payment-type-filter');
  if (paymentTypeFilter) {
    paymentTypeFilter.onchange = () => {
      setState({ paymentFilter: { ...state.paymentFilter, typeId: paymentTypeFilter.value } });
    };
  }
  const paymentFilterClear = document.getElementById('payment-filter-clear');
  if (paymentFilterClear) {
    paymentFilterClear.onclick = () => setState({ paymentFilter: { search: '', typeId: '' } });
  }

  // ---- PRINT LEDGER (date range) ----
  const printLedgerBtn = document.getElementById('print-ledger-btn');
  if (printLedgerBtn) {
    printLedgerBtn.onclick = () => {
      const modal = document.getElementById('ledger-modal');
      if (modal) modal.classList.remove('hidden');
    };
  }

  const ledgerCancel = document.getElementById('ledger-cancel');
  if (ledgerCancel) ledgerCancel.onclick = () => document.getElementById('ledger-modal').classList.add('hidden');

  const ledgerGenerate = document.getElementById('ledger-generate');
  if (ledgerGenerate) {
    ledgerGenerate.onclick = () => {
      const from = document.getElementById('ledger-from').value;
      const to = document.getElementById('ledger-to').value;
      document.getElementById('ledger-modal').classList.add('hidden');
      printLedger(from, to);
    };

  const payCancel = document.getElementById('pay-cancel');
  if (payCancel) payCancel.onclick = () => document.getElementById('payment-modal').classList.add('hidden');

  const payForm = document.getElementById('payment-form');
  if (payForm) {
    payForm.onsubmit = async (e) => {
      e.preventDefault();
      const homeownerId = document.getElementById('pay-homeowner').value;
      if (!homeownerId) {
        toast('Please pick a homeowner from the search results.', true);
        return;
      }
      const id = document.getElementById('pay-id').value;
      const orNumber = document.getElementById('pay-or').value.trim();
      const amountVal = parseFloat(document.getElementById('pay-amount').value);
      if (!orNumber) {
        toast('OR# is required.', true);
        return;
      }
      if (!amountVal || amountVal <= 0) {
        toast('Amount is required and must be greater than 0.', true);
        return;
      }
      const periodFromVal = document.getElementById('pay-period-from').value;
      const periodToVal = document.getElementById('pay-period-to').value;
      const payload = {
        homeowner_id: homeownerId,
        payment_type_id: document.getElementById('pay-type').value,
        or_number: orNumber,
        amount: amountVal,
        payment_date: document.getElementById('pay-date').value,
        period_from: periodFromVal ? periodFromVal + '-01' : null,
        period_to: periodToVal ? periodToVal + '-01' : null,
        remarks: document.getElementById('pay-remarks').value.trim(),
      };
      let error;
      if (id) {
        ({ error } = await sb.from('payments').update(payload).eq('id', id));
      } else {
        payload.created_by = state.currentUser.id;
        ({ error } = await sb.from('payments').insert(payload));
      }
      if (error) {
        if (error.message.includes('duplicate') || error.message.includes('unique')) {
          return toast('That OR# is already used. Each OR# must be unique.', true);
        }
        return toast(error.message, true);
      }
      toast('Payment saved');
      document.getElementById('payment-modal').classList.add('hidden');
      await loadAllData();
      render();
    };
  }

  // ---- PAYMENT TYPES MANAGER ----
  const manageTypesBtn = document.getElementById('manage-types-btn');
  if (manageTypesBtn) manageTypesBtn.onclick = () => document.getElementById('types-modal').classList.remove('hidden');

  const typesClose = document.getElementById('types-close');
  if (typesClose) typesClose.onclick = () => document.getElementById('types-modal').classList.add('hidden');

  document.querySelectorAll('[data-save-type]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.saveType;
      const nameInput = document.querySelector(`.type-name-input[data-type-id="${id}"]`);
      const activeInput = document.querySelector(`[data-type-active="${id}"]`);
      const { error } = await sb.from('payment_types').update({ name: nameInput.value.trim(), is_active: activeInput.checked }).eq('id', id);
      if (error) return toast(error.message, true);
      toast('Payment type updated');
      await loadAllData();
      render();
      document.getElementById('types-modal').classList.remove('hidden');
    };
  });

  const addTypeBtn = document.getElementById('add-type-btn');
  if (addTypeBtn) {
    addTypeBtn.onclick = async () => {
      const input = document.getElementById('new-type-name');
      const name = input.value.trim();
      if (!name) return;
      const maxOrder = Math.max(0, ...state.paymentTypes.map(t => t.sort_order || 0));
      const { error } = await sb.from('payment_types').insert({ name, sort_order: maxOrder + 1 });
      if (error) return toast(error.message, true);
      toast('Payment type added');
      await loadAllData();
      render();
      document.getElementById('types-modal').classList.remove('hidden');
    };
  }

  // ---- EXPENSES ----
  const addExpBtn = document.getElementById('add-expense-btn');
  if (addExpBtn) addExpBtn.onclick = () => openExpenseModal();

  document.querySelectorAll('[data-edit-expense]').forEach(btn => {
    btn.onclick = () => openExpenseModal(state.expenses.find(x => x.id === btn.dataset.editExpense));
  });

  document.querySelectorAll('[data-delete-expense]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Delete this expense record?')) return;
      const { error } = await sb.from('expenses').delete().eq('id', btn.dataset.deleteExpense);
      if (error) return toast(error.message, true);
      toast('Expense deleted');
      await loadAllData();
      render();
    };
  });

  const printMonthlyExp = document.getElementById('print-monthly-expenses');
  if (printMonthlyExp) printMonthlyExp.onclick = () => printExpenseReport('monthly');

  const printYearlyExp = document.getElementById('print-yearly-expenses');
  if (printYearlyExp) printYearlyExp.onclick = () => printExpenseReport('yearly');

  const expCancel = document.getElementById('exp-cancel');
  if (expCancel) expCancel.onclick = () => document.getElementById('expense-modal').classList.add('hidden');

  const expForm = document.getElementById('expense-form');
  if (expForm) {
    expForm.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('exp-id').value;
      const payload = {
        category_id: document.getElementById('exp-category').value,
        description: document.getElementById('exp-description').value.trim(),
        amount: parseFloat(document.getElementById('exp-amount').value),
        expense_date: document.getElementById('exp-date').value,
        receipt_ref: document.getElementById('exp-receipt').value.trim(),
      };
      let error;
      if (id) {
        ({ error } = await sb.from('expenses').update(payload).eq('id', id));
      } else {
        payload.created_by = state.currentUser.id;
        ({ error } = await sb.from('expenses').insert(payload));
      }
      if (error) return toast(error.message, true);
      toast('Expense saved');
      document.getElementById('expense-modal').classList.add('hidden');
      await loadAllData();
      render();
    };
  }

  // ---- REPORTS: period selectors ----
  const reportModeSelect = document.getElementById('report-mode-select');
  if (reportModeSelect) reportModeSelect.onchange = () => setState({ reportMode: reportModeSelect.value });

  const reportYearSelect = document.getElementById('report-year-select');
  if (reportYearSelect) reportYearSelect.onchange = () => setState({ reportYear: parseInt(reportYearSelect.value) });

  const reportMonthSelect = document.getElementById('report-month-select');
  if (reportMonthSelect) reportMonthSelect.onchange = () => setState({ reportMonth: parseInt(reportMonthSelect.value) });

  // ---- REPORTS: member search/select ----
  const reportMemberSearch = document.getElementById('report-member-search');
  if (reportMemberSearch) {
    const resultsBox = document.getElementById('report-member-results');
    reportMemberSearch.oninput = () => {
      const cursorPos = reportMemberSearch.selectionStart;
      const q = reportMemberSearch.value.trim().toLowerCase();
      setState({ reportMemberSearch: reportMemberSearch.value });
      const refreshed = document.getElementById('report-member-search');
      if (refreshed) { refreshed.focus(); refreshed.setSelectionRange(cursorPos, cursorPos); }
      const box = document.getElementById('report-member-results');
      if (!q) { box.classList.add('hidden'); return; }
      const matches = state.homeowners.filter(h => (h.name||'').toLowerCase().includes(q) && !state.reportSelectedMembers.includes(h.id)).slice(0, 15);
      box.innerHTML = matches.map(h => `
        <button type="button" data-add-report-member="${h.id}" class="w-full text-left px-3 py-2 text-sm hover:bg-violet-50 block">
          ${escapeHtml(h.name)} <span class="text-xs text-slate-400">(Blk ${escapeHtml(h.block||'-')} Lot ${escapeHtml(h.lot||'-')})</span>
        </button>
      `).join('') || `<div class="px-3 py-2 text-sm text-slate-400">No matches.</div>`;
      box.querySelectorAll('[data-add-report-member]').forEach(btn => {
        btn.onclick = () => {
          setState({
            reportSelectedMembers: [...state.reportSelectedMembers, btn.dataset.addReportMember],
            reportMemberSearch: '',
          });
        };
      });
      box.classList.remove('hidden');
    };
    document.addEventListener('click', (e) => {
      if (resultsBox && !reportMemberSearch.contains(e.target) && !resultsBox.contains(e.target)) {
        resultsBox.classList.add('hidden');
      }
    });
  }

  document.querySelectorAll('[data-remove-report-member]').forEach(btn => {
    btn.onclick = () => {
      setState({ reportSelectedMembers: state.reportSelectedMembers.filter(id => id !== btn.dataset.removeReportMember) });
    };
  });

  // ---- REPORTS: payment type checkboxes ----
  document.querySelectorAll('[data-report-type-checkbox]').forEach(cb => {
    cb.onchange = () => {
      const id = cb.dataset.reportTypeCheckbox;
      const current = state.reportSelectedTypes;
      const updated = cb.checked ? [...current, id] : current.filter(x => x !== id);
      setState({ reportSelectedTypes: updated });
    };
  });

  // ---- REPORTS: print buttons ----
  const printMemberStatements = document.getElementById('print-member-statements');
  if (printMemberStatements) {
    printMemberStatements.onclick = () => {
      if (state.reportSelectedMembers.length === 0) {
        toast('Select at least one member first.', true);
        return;
      }
      printMemberStatementsReport(state.reportSelectedMembers);
    };
  }

  const printTypeReport = document.getElementById('print-type-report');
  if (printTypeReport) {
    printTypeReport.onclick = () => {
      if (state.reportSelectedTypes.length === 0) {
        toast('Select at least one payment type first.', true);
        return;
      }
      printTypeReportFn(state.reportSelectedTypes);
    };
  }

  const printRankingReport = document.getElementById('print-ranking-report');
  if (printRankingReport) printRankingReport.onclick = () => printRankingReportFn();
  const printReportBtn = document.getElementById('print-financial-report');
  if (printReportBtn) printReportBtn.onclick = () => window.print();

  // ---- MEMBER VIEW PRINT ----
  const printMemberBtn = document.getElementById('print-member-history');
  if (printMemberBtn) printMemberBtn.onclick = () => window.print();

  // ---- EMAIL BLAST ----
  const emailForm = document.getElementById('email-form');
  if (emailForm) {
    emailForm.onsubmit = (e) => {
      e.preventDefault();
      const recipientMode = document.getElementById('email-recipients').value;
      const subject = document.getElementById('email-subject').value.trim();
      const body = document.getElementById('email-body').value.trim();
      const recipients = state.homeowners
        .filter(h => (recipientMode === 'everyone' || h.status === 'active') && h.email)
        .map(h => h.email);

      if (recipients.length === 0) return toast('No homeowners with an email on file match this filter.', true);

      // mailto: links have a practical length limit (~1800-2000 chars across
      // browsers). Batch recipients into multiple BCC groups so nothing gets
      // silently dropped for large lists.
      const BATCH_SIZE = 40;
      const batches = [];
      for (let i = 0; i < recipients.length; i += BATCH_SIZE) {
        batches.push(recipients.slice(i, i + BATCH_SIZE));
      }

      batches.forEach((batch, i) => {
        const bcc = batch.join(',');
        const mailtoUrl = `mailto:?bcc=${encodeURIComponent(bcc)}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        // Stagger window opens slightly so browsers don't block them as popups
        setTimeout(() => window.open(mailtoUrl, '_blank'), i * 400);
      });

      toast(batches.length > 1
        ? `Opening ${batches.length} Gmail windows (${recipients.length} recipients total, batched by ${BATCH_SIZE}).`
        : `Opening Gmail with ${recipients.length} recipient(s) BCC'd.`);
    };
  }
}

// =====================================================================
// MODAL OPENERS
// =====================================================================
function openHomeownerModal(ho) {
  const modal = document.getElementById('homeowner-modal');
  document.getElementById('ho-modal-title').textContent = ho ? 'Edit Homeowner' : 'Add Homeowner';
  document.getElementById('ho-id').value = ho?.id || '';
  document.getElementById('ho-first-name').value = ho?.first_name || '';
  document.getElementById('ho-middle-name').value = ho?.middle_name || '';
  document.getElementById('ho-last-name').value = ho?.last_name || '';
  document.getElementById('ho-name').value = ho?.name || '';
  document.getElementById('ho-block').value = ho?.block || '';
  document.getElementById('ho-lot').value = ho?.lot || '';
  document.getElementById('ho-area').value = ho?.area || '';
  document.getElementById('ho-dob').value = ho?.date_of_birth || '';
  document.getElementById('ho-income').value = ho?.monthly_income || '';
  document.getElementById('ho-email').value = ho?.email || '';
  document.getElementById('ho-status').value = ho?.status || 'active';
  document.getElementById('ho-notes').value = ho?.notes || '';
  modal.classList.remove('hidden');
}

function openPaymentModal(p) {
  const modal = document.getElementById('payment-modal');
  document.getElementById('pay-modal-title').textContent = p ? 'Edit Payment' : 'Log Payment';
  document.getElementById('pay-id').value = p?.id || '';
  document.getElementById('pay-homeowner').value = p?.homeowner_id || '';
  if (p?.homeowner_id) {
    const ho = state.homeowners.find(h => h.id === p.homeowner_id);
    document.getElementById('pay-homeowner-search').value = ho ? `${ho.name} (Blk ${ho.block||'-'} Lot ${ho.lot||'-'})` : '';
  } else {
    document.getElementById('pay-homeowner-search').value = '';
  }
  document.getElementById('pay-homeowner-results').classList.add('hidden');
  document.getElementById('pay-type').value = p?.payment_type_id || '';
  document.getElementById('pay-or').value = p?.or_number || '';
  document.getElementById('pay-amount').value = p?.amount || '';
  document.getElementById('pay-date').value = p?.payment_date || new Date().toISOString().slice(0,10);
  document.getElementById('pay-period-from').value = p?.period_from ? p.period_from.slice(0,7) : '';
  document.getElementById('pay-period-to').value = p?.period_to ? p.period_to.slice(0,7) : '';
  document.getElementById('pay-remarks').value = p?.remarks || '';
  modal.classList.remove('hidden');
}

function openExpenseModal(ex) {
  const modal = document.getElementById('expense-modal');
  document.getElementById('exp-modal-title').textContent = ex ? 'Edit Expense' : 'Add Expense';
  document.getElementById('exp-id').value = ex?.id || '';
  document.getElementById('exp-category').value = ex?.category_id || '';
  document.getElementById('exp-description').value = ex?.description || '';
  document.getElementById('exp-amount').value = ex?.amount || '';
  document.getElementById('exp-date').value = ex?.expense_date || new Date().toISOString().slice(0,10);
  document.getElementById('exp-receipt').value = ex?.receipt_ref || '';
  modal.classList.remove('hidden');
}

// =====================================================================
// PRINT HELPERS — build a temporary printable view, then trigger print
// =====================================================================
function printMasterlist(includeDob, includeIncome) {
  const sort = state.homeownerSort;
  const q = state.homeownerSearch.trim().toLowerCase();
  let rows = [...state.homeowners];
  if (q) {
    rows = rows.filter(h =>
      (h.name||'').toLowerCase().includes(q) ||
      (h.block||'').toLowerCase().includes(q) ||
      (h.lot||'').toLowerCase().includes(q) ||
      (h.email||'').toLowerCase().includes(q)
    );
  }
  if (sort.field) {
    rows.sort((a, b) => {
      let av, bv;
      if (sort.field === 'name') { av = (a.name||'').toLowerCase(); bv = (b.name||'').toLowerCase(); }
      else { av = parseFloat(a.block) || a.block || ''; bv = parseFloat(b.block) || b.block || ''; }
      if (av < bv) return sort.dir === 'asc' ? -1 : 1;
      if (av > bv) return sort.dir === 'asc' ? 1 : -1;
      return 0;
    });
  } else {
    rows.sort((a, b) => (a.name||'').localeCompare(b.name||''));
  }

  const extraHeaders = [
    includeDob ? '<th>Date of Birth</th>' : '',
    includeIncome ? '<th>Monthly Income</th>' : '',
  ].join('');

  const rowsHtml = rows.map((h, i) => `
    <tr>
      <td>${i+1}</td>
      <td>${escapeHtml(h.name)}</td>
      <td>${escapeHtml(h.block||'')}</td>
      <td>${escapeHtml(h.lot||'')}</td>
      <td>${escapeHtml(h.area||'')}</td>
      <td>${escapeHtml(h.email||'')}</td>
      <td>${escapeHtml(h.status||'')}</td>
      <td>${isDuesUpdated(h.id) ? 'Updated' : 'Needs Update'}</td>
      ${includeDob ? `<td>${h.date_of_birth ? fmtDate(h.date_of_birth) : ''}</td>` : ''}
      ${includeIncome ? `<td>${h.monthly_income ? peso(h.monthly_income) : ''}</td>` : ''}
    </tr>
  `).join('');

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Homeowners Masterlist</title>
    <style>
      @page { size: 8.5in 13in landscape; margin: 0.4in; }
      body{font-family:Arial,sans-serif;padding:10px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:13px;color:#64748b;margin-top:4px;font-weight:normal}
      table{width:100%;border-collapse:collapse;margin-top:14px}
      th,td{border:1px solid #cbd5e1;padding:6px 8px;font-size:11px;text-align:left}
      th{background:#f1f5f9}
      .meta{font-size:10px;color:#94a3b8;margin-top:20px}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Homeowners Masterlist — ${rows.length} total members</h2>
    <table>
      <thead><tr>
        <th>#</th><th>Name</th><th>Block</th><th>Lot</th><th>Area</th><th>Email</th><th>Status</th><th>Dues Status</th>${extraHeaders}
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
    <p class="meta">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

function printLedger(fromDate, toDate) {
  let rows = [...state.payments];
  if (fromDate) rows = rows.filter(p => p.payment_date >= fromDate);
  if (toDate) rows = rows.filter(p => p.payment_date <= toDate);
  rows.sort((a,b) => new Date(a.payment_date) - new Date(b.payment_date));

  const total = rows.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const rangeLabel = fromDate || toDate
    ? `${fromDate ? fmtDate(fromDate) : 'Beginning'} – ${toDate ? fmtDate(toDate) : 'Present'}`
    : 'All Records';

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Payment Ledger</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}
      table{width:100%;border-collapse:collapse;margin-top:16px}
      th,td{border:1px solid #cbd5e1;padding:8px;font-size:12px;text-align:left}
      th{background:#f1f5f9}
      .total{margin-top:16px;font-size:15px;font-weight:bold}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Payment Ledger — ${rangeLabel}</h2>
    <table><thead><tr><th>Date</th><th>Homeowner</th><th>Blk/Lot</th><th>OR #</th><th>Type</th><th>Period Covered</th><th>Amount</th><th>Remarks</th></tr></thead>
    <tbody>${rows.map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${escapeHtml(p.homeowners?.name||'')}</td><td>${escapeHtml(p.homeowners?.block||'')}/${escapeHtml(p.homeowners?.lot||'')}</td><td>${escapeHtml(p.or_number)}</td><td>${escapeHtml(p.payment_types?.name||'')}</td><td>${fmtPeriod(p)||'—'}</td><td>${peso(p.amount)}</td><td>${escapeHtml(p.remarks||'')}${p.is_voided?' (VOIDED)':''}</td></tr>`).join('') || `<tr><td colspan="8">No payments found in this range.</td></tr>`}</tbody></table>
    <p class="total">Total (excluding voided): ${peso(total)}</p>
    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

function printMemberStatementsReport(memberIds) {
  const members = state.homeowners.filter(h => memberIds.includes(h.id));
  const sections = members.map(ho => {
    const pays = state.payments.filter(p => p.homeowner_id === ho.id);
    const total = pays.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
    return `
      <div style="margin-bottom:30px;">
        <p><b>${escapeHtml(ho.name)}</b><br>Block ${escapeHtml(ho.block||'-')}, Lot ${escapeHtml(ho.lot||'-')} &middot; ${escapeHtml(ho.area||'-')} sqm<br>${escapeHtml(ho.email||'No email on file')}</p>
        <table><thead><tr><th>Date</th><th>OR #</th><th>Payment Type</th><th>Period Covered</th><th>Amount</th><th>Remarks</th></tr></thead>
        <tbody>${pays.map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${escapeHtml(p.or_number)}</td><td>${escapeHtml(p.payment_types?.name||'')}</td><td>${fmtPeriod(p)||'—'}</td><td>${peso(p.amount)}</td><td>${escapeHtml(p.remarks||'')}${p.is_voided?' (VOIDED)':''}</td></tr>`).join('') || `<tr><td colspan="6">No payments recorded.</td></tr>`}</tbody></table>
        <p style="margin-top:8px;font-weight:bold;">Total Paid: ${peso(total)}</p>

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Member Statements</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}

    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Member Statement(s) — ${members.length} member(s)</h2>

    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>

  setTimeout(() => win.print(), 300);

  const rows = state.payments.filter(p => typeIds.includes(p.payment_type_id));
  rows.sort((a,b) => new Date(b.payment_date) - new Date(a.payment_date));
  const total = rows.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const typeNames = types.map(t=>t.name).join(', ');

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Payment Type Report</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}

    <tbody>${rows.map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${escapeHtml(p.homeowners?.name||'')}</td><td>${escapeHtml(p.homeowners?.block||'')}/${escapeHtml(p.homeowners?.lot||'')}</td><td>${escapeHtml(p.or_number)}</td><td>${fmtPeriod(p)||'—'}</td><td>${peso(p.amount)}</td><td>${escapeHtml(p.remarks||'')}${p.is_voided?' (VOIDED)':''}</td></tr>`).join('') || `<tr><td colspan="7">No payments found for the selected type(s).</td></tr>`}</tbody></table>

function printRankingReportFn() {
  const activeHomeowners = state.homeowners.filter(h => h.status === 'active');
  const sections = state.paymentTypes.map(t => {
    const ranked = activeHomeowners.map(h => {
      const total = state.payments
        .filter(p => p.homeowner_id === h.id && p.payment_type_id === t.id && !p.is_voided)
        .reduce((s,p) => s + Number(p.amount), 0);
      return { name: h.name, block: h.block, lot: h.lot, total };
    }).sort((a,b) => b.total - a.total);

    return `
      <h3 style="font-size:13px;margin-top:24px;margin-bottom:6px;">${escapeHtml(t.name)}</h3>
      <table><thead><tr><th>#</th><th>Homeowner</th><th>Blk/Lot</th><th>Total Paid</th></tr></thead>
      <tbody>${ranked.map((r,i)=>`<tr style="${r.total===0?'color:#dc2626;':''}"><td>${i+1}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.block||'')}/${escapeHtml(r.lot||'')}</td><td>${r.total===0?'NO PAYMENT':peso(r.total)}</td></tr>`).join('')}</tbody></table>
    `;
  }).join('');

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Payment Ranking Report</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}
      table{width:100%;border-collapse:collapse;margin-top:6px}
      th,td{border:1px solid #cbd5e1;padding:6px 8px;font-size:12px;text-align:left}
      th{background:#f1f5f9}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Payment Ranking Report — by Payment Type, Highest to Lowest</h2>
    <p style="font-size:11px;color:#94a3b8;">Active homeowners with PHP 0.00 / "NO PAYMENT" shown in red have not paid this type at all.</p>
    ${sections}
    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

function printExpenseReport(period) {
  const now = new Date();
  let filtered, label;
  if (period === 'monthly') {
    filtered = state.expenses.filter(e => {
      const d = new Date(e.expense_date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    label = now.toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });
  } else {
    filtered = state.expenses.filter(e => new Date(e.expense_date).getFullYear() === now.getFullYear());
    label = `Year ${now.getFullYear()}`;
  }
  const total = filtered.reduce((s,e)=>s+Number(e.amount),0);

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Expenses - ${label}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}
      table{width:100%;border-collapse:collapse;margin-top:16px}
      th,td{border:1px solid #cbd5e1;padding:8px;font-size:13px;text-align:left}
      th{background:#f1f5f9}
      .total{margin-top:16px;font-size:15px;font-weight:bold}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Expense Report — ${label}</h2>
    <table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Receipt Ref</th></tr></thead>
    <tbody>${filtered.map(e=>`<tr><td>${fmtDate(e.expense_date)}</td><td>${escapeHtml(e.expense_categories?.name||'')}</td><td>${escapeHtml(e.description)}</td><td>${peso(e.amount)}</td><td>${escapeHtml(e.receipt_ref||'')}</td></tr>`).join('') || `<tr><td colspan="5">No expenses recorded for this period.</td></tr>`}</tbody></table>
    <p class="total">Total: ${peso(total)}</p>
    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}
