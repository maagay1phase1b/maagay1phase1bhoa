<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maagay 1 Phase 1-B HOA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body class="bg-slate-50 min-h-screen">

<div id="app" class="min-h-screen"></div>

<script>
// =====================================================================
// CONFIG
// =====================================================================
const SUPABASE_URL = 'https://dnfwwqelininbracwfnv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRuZnd3cWVsaW5pbmJyYWN3Zm52Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NDc3NTMsImV4cCI6MjA5ODEyMzc1M30.aZXzlgwtfrynyGJJ7UJprKRjVNceNAQzHXPJ5QImgWI';
const EDGE_FUNCTION_URL = SUPABASE_URL.replace('.supabase.co', '.supabase.co/functions/v1') + '/send-email';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// =====================================================================
// STATE
// =====================================================================
let state = {
  currentUser: null,   // { type: 'staff', role, username, id } OR { type: 'member', homeowner }
  homeowners: [],
  paymentTypes: [],
  payments: [],
  expenseCategories: [],
  expenses: [],
  view: 'login',
  loginMode: 'staff',   // 'staff' or 'member'
  loading: false,
  toast: null,
};

const root = document.getElementById('app');

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

function toast(msg, isError = false) {
  setState({ toast: { msg, isError } });
  setTimeout(() => setState({ toast: null }), 3000);
}

function peso(n) {
  return 'PHP ' + Number(n || 0).toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// =====================================================================
// AUTH (simplified — no Supabase Auth sessions, just direct checks)
// =====================================================================
async function loginStaff(username, password) {
  const { data, error } = await sb.rpc('verify_app_user', { p_username: username, p_password: password });
  if (error) {
    toast('Login error: ' + error.message, true);
    return;
  }
  if (!data || data.length === 0) {
    toast('Incorrect username or password.', true);
    return;
  }
  const user = data[0];
  setState({ currentUser: { type: 'staff', id: user.id, username: user.username, role: user.role }, view: 'dashboard' });
  await loadAllData();
}

async function loginMember(email) {
  const { data, error } = await sb.from('homeowners').select('*').eq('email', email.trim()).maybeSingle();
  if (error) {
    toast('Login error: ' + error.message, true);
    return;
  }
  if (!data) {
    toast('No homeowner record found with that email. Contact the HOA admin.', true);
    return;
  }
  setState({ currentUser: { type: 'member', homeowner: data }, view: 'member-dashboard' });
  await loadAllData();
}

function logout() {
  setState({ currentUser: null, view: 'login', homeowners: [], payments: [], expenses: [] });
}

// =====================================================================
// DATA LOADING
// =====================================================================
async function loadAllData() {
  if (!state.currentUser) return;

  if (state.currentUser.type === 'staff') {
    const [hRes, ptRes, pRes, ecRes, eRes] = await Promise.all([
      sb.from('homeowners').select('*').order('block').order('lot'),
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, homeowners(name,block,lot), payment_types(name)').order('payment_date', { ascending: false }),
      sb.from('expense_categories').select('*').order('sort_order'),
      sb.from('expenses').select('*, expense_categories(name)').order('expense_date', { ascending: false }),
    ]);
    setState({
      homeowners: hRes.data || [],
      paymentTypes: ptRes.data || [],
      payments: pRes.data || [],
      expenseCategories: ecRes.data || [],
      expenses: eRes.data || [],
    });
  } else if (state.currentUser.type === 'member') {
    const homeownerId = state.currentUser.homeowner.id;
    const [ptRes, pRes] = await Promise.all([
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, payment_types(name)').eq('homeowner_id', homeownerId).order('payment_date', { ascending: false }),
    ]);
    setState({
      paymentTypes: ptRes.data || [],
      payments: pRes.data || [],
      homeowners: [state.currentUser.homeowner],
    });
  }
}

function balanceFor(homeownerId) {
  const total = state.payments
    .filter(p => p.homeowner_id === homeownerId && !p.is_voided)
    .reduce((sum, p) => sum + Number(p.amount), 0);
  return total;
}

// =====================================================================
// RENDER — ROUTER
// =====================================================================
function render() {
  if (state.loading) {
    root.innerHTML = `<div class="flex items-center justify-center h-screen"><div class="spinner"></div></div>`;
    return;
  }

  let html = '';
  if (!state.currentUser) html = renderLogin();
  else if (state.currentUser.type === 'member') html = renderMemberDashboard();
  else html = renderStaffShell();

  root.innerHTML = `
    ${html}
    ${state.toast ? `<div class="fixed bottom-6 right-6 px-4 py-3 rounded-lg shadow-lg text-white text-sm no-print ${state.toast.isError ? 'bg-red-600' : 'bg-emerald-600'}">${escapeHtml(state.toast.msg)}</div>` : ''}
  `;
  attachHandlers();
}

// =====================================================================
// LOGIN VIEW
// =====================================================================

      <div class="text-center mb-6">

  </div>`;

// =====================================================================

// =====================================================================

    ['homeowners', 'Homeowners'],
    ['payments', 'Payments'],
    ['expenses', 'Expenses'],
    ['reports', 'Reports'],
    ['email', 'Email Blast'],
  ];
  const active = state.view;

  return `
  <div class="flex h-screen overflow-hidden">
    <aside class="w-56 bg-slate-900 text-slate-300 flex flex-col no-print">
      <div class="p-5 border-b border-slate-700">
        <p class="font-bold text-white text-sm leading-tight">Maagay 1 Phase 1-B</p>
        <p class="text-xs text-slate-500">${isSuper ? 'Super Admin' : 'Admin (view only)'}</p>
      </div>
      <nav class="flex-1 py-3">
        ${tabs.map(([key,label]) => `
          <button data-nav="${key}" class="w-full text-left px-5 py-2.5 text-sm hover:bg-slate-800 transition ${active===key ? 'bg-slate-800 text-white border-r-2 border-blue-500' : ''}">${label}</button>

        <p class="text-xs text-slate-500 mb-2 truncate">${escapeHtml(state.currentUser.username)}</p>

      </div>
    </aside>
    <main class="flex-1 overflow-y-auto bg-slate-50">
      <div class="p-4 md:p-8">
        ${renderStaffView()}
      </div>
    </main>
  </div>`;
}

function renderStaffView() {
  switch (state.view) {
    case 'dashboard': return renderOverview();
    case 'homeowners': return renderHomeowners();
    case 'payments': return renderPayments();
    case 'expenses': return renderExpenses();
    case 'reports': return renderReports();
    case 'email': return renderEmailBlast();
    default: return renderOverview();
  }
}

// ---------------- OVERVIEW ----------------
function renderOverview() {
  const totalIncome = state.payments.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const totalExpense = state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const balance = totalIncome - totalExpense;
  const activeMembers = state.homeowners.filter(h=>h.status==='active').length;

  return `
  <h1 class="text-xl font-bold text-slate-800 mb-6">Dashboard</h1>
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white rounded-xl shadow p-5"><p class="text-xs text-slate-500 mb-1">Active Homeowners</p><p class="text-2xl font-bold text-slate-800">${activeMembers}</p></div>
    <div class="bg-white rounded-xl shadow p-5"><p class="text-xs text-slate-500 mb-1">Total Collected</p><p class="text-2xl font-bold text-emerald-600">${peso(totalIncome)}</p></div>
    <div class="bg-white rounded-xl shadow p-5"><p class="text-xs text-slate-500 mb-1">Total Expenses</p><p class="text-2xl font-bold text-red-600">${peso(totalExpense)}</p></div>
    <div class="bg-white rounded-xl shadow p-5"><p class="text-xs text-slate-500 mb-1">Net Balance</p><p class="text-2xl font-bold ${balance>=0?'text-blue-700':'text-red-700'}">${peso(balance)}</p></div>
  </div>
  <div class="bg-white rounded-xl shadow p-5">
    <h3 class="font-semibold text-slate-700 mb-3">Recent Payments</h3>
    <table>
      <thead><tr><th>Date</th><th>Homeowner</th><th>OR #</th><th>Type</th><th>Amount</th></tr></thead>
      <tbody>
        ${state.payments.slice(0,8).map(p=>`
          <tr><td>${fmtDate(p.payment_date)}</td><td>${escapeHtml(p.homeowners?.name||'')}</td><td>${escapeHtml(p.or_number)}</td><td>${escapeHtml(p.payment_types?.name||'')}</td><td>${peso(p.amount)}</td></tr>
        `).join('') || `<tr><td colspan="5" class="text-center text-slate-400">No payments yet</td></tr>`}
      </tbody>
    </table>
  </div>`;
}

        <textarea placeholder="Notes (optional)" id="ho-notes" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea>
        <div class="flex gap-2 pt-2">
          <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm">Save</button>
          <button type="button" id="ho-cancel" class="flex-1 bg-slate-100 py-2 rounded-lg text-sm">Cancel</button>

// ---------------- REPORTS ----------------
function renderReports() {
  const totalIncome = state.payments.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const totalExpense = state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const net = totalIncome - totalExpense;

  const incomeByType = state.paymentTypes.map(t=>({
    name: t.name,
    total: state.payments.filter(p=>p.payment_type_id===t.id && !p.is_voided).reduce((s,p)=>s+Number(p.amount),0)
  })).filter(x=>x.total>0);

  const expenseByCat = state.expenseCategories.map(c=>({
    name: c.name,
    total: state.expenses.filter(e=>e.category_id===c.id).reduce((s,e)=>s+Number(e.amount),0)
  })).filter(x=>x.total>0);

  return `
  <div class="flex justify-between items-center mb-6 no-print">
    <h1 class="text-xl font-bold text-slate-800">Financial Report</h1>
    <button id="print-financial-report" class="text-sm bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg">Print / PDF</button>
  </div>
  <div id="financial-report-area" class="bg-white rounded-xl shadow p-6 space-y-6">
    <div class="text-center border-b pb-4">
      <h2 class="font-bold text-lg">Maagay 1 Phase 1-B Homeowners Association Inc.</h2>
      <p class="text-sm text-slate-500">Statement of Income, Expenses &amp; Balance</p>
      <p class="text-xs text-slate-400">As of ${fmtDate(new Date())}</p>
    </div>

    <div class="grid grid-cols-3 gap-4">
      <div class="bg-emerald-50 rounded-lg p-4 text-center"><p class="text-xs text-emerald-700">Total Income</p><p class="text-xl font-bold text-emerald-800">${peso(totalIncome)}</p></div>
      <div class="bg-red-50 rounded-lg p-4 text-center"><p class="text-xs text-red-700">Total Expenses</p><p class="text-xl font-bold text-red-800">${peso(totalExpense)}</p></div>
      <div class="bg-blue-50 rounded-lg p-4 text-center"><p class="text-xs text-blue-700">Net Balance</p><p class="text-xl font-bold text-blue-800">${peso(net)}</p></div>
    </div>

    <div>
      <h3 class="font-semibold text-slate-700 mb-2">Income by Payment Type</h3>
      <table><thead><tr><th>Payment Type</th><th>Total Collected</th></tr></thead>
      <tbody>${incomeByType.map(x=>`<tr><td>${escapeHtml(x.name)}</td><td>${peso(x.total)}</td></tr>`).join('') || `<tr><td colspan="2" class="text-center text-slate-400">No income recorded</td></tr>`}</tbody></table>
    </div>

    <div>
      <h3 class="font-semibold text-slate-700 mb-2">Expenses by Category</h3>
      <table><thead><tr><th>Category</th><th>Total Spent</th></tr></thead>
      <tbody>${expenseByCat.map(x=>`<tr><td>${escapeHtml(x.name)}</td><td>${peso(x.total)}</td></tr>`).join('') || `<tr><td colspan="2" class="text-center text-slate-400">No expenses recorded</td></tr>`}</tbody></table>
    </div>
  </div>`;
}

// =====================================================================
// EVENT HANDLERS
// =====================================================================
function attachHandlers() {
  // ---- LOGIN MODE TOGGLE ----
  const modeStaff = document.getElementById('mode-staff');
  if (modeStaff) modeStaff.onclick = () => setState({ loginMode: 'staff' });
  const modeMember = document.getElementById('mode-member');
  if (modeMember) modeMember.onclick = () => setState({ loginMode: 'member' });

  // ---- STAFF LOGIN ----
  const staffForm = document.getElementById('staff-login-form');
  if (staffForm) {
    staffForm.onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById('staff-username').value.trim();
      const password = document.getElementById('staff-password').value;
      await loginStaff(username, password);
    };
  }

  // ---- MEMBER LOGIN ----
  const memberForm = document.getElementById('member-login-form');
  if (memberForm) {
    memberForm.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('member-email').value.trim();
      await loginMember(email);
    };
  }

  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.onclick = logout;

  // ---- NAV ----
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.onclick = () => setState({ view: btn.dataset.nav });
  });

  // ---- HOMEOWNERS ----
  const addHoBtn = document.getElementById('add-homeowner-btn');
  if (addHoBtn) addHoBtn.onclick = () => openHomeownerModal();

  document.querySelectorAll('[data-edit-homeowner]').forEach(btn => {
    btn.onclick = () => openHomeownerModal(state.homeowners.find(h => h.id === btn.dataset.editHomeowner));
  });

  document.querySelectorAll('[data-delete-homeowner]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Delete this homeowner and all their payment records? This cannot be undone.')) return;
      const { error } = await sb.from('homeowners').delete().eq('id', btn.dataset.deleteHomeowner);
      if (error) return toast(error.message, true);
      toast('Homeowner deleted');
      await loadAllData();
      render();
    };
  });

  document.querySelectorAll('[data-print-homeowner]').forEach(btn => {
    btn.onclick = () => printHomeownerStatement(btn.dataset.printHomeowner);
  });

  const printAllHo = document.getElementById('print-all-homeowners');
  if (printAllHo) printAllHo.onclick = () => window.print();

  const hoCancel = document.getElementById('ho-cancel');
  if (hoCancel) hoCancel.onclick = () => document.getElementById('homeowner-modal').classList.add('hidden');

  const hoForm = document.getElementById('homeowner-form');
  if (hoForm) {
    hoForm.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('ho-id').value;
      const payload = {
        name: document.getElementById('ho-name').value.trim(),
        block: document.getElementById('ho-block').value.trim(),
        lot: document.getElementById('ho-lot').value.trim(),
        area: parseFloat(document.getElementById('ho-area').value) || null,
        email: document.getElementById('ho-email').value.trim(),
        status: document.getElementById('ho-status').value,
        notes: document.getElementById('ho-notes').value.trim(),
      };
      let error;
      if (id) {
        ({ error } = await sb.from('homeowners').update(payload).eq('id', id));
      } else {
        ({ error } = await sb.from('homeowners').insert(payload));
      }
      if (error) return toast(error.message, true);
      toast('Homeowner saved');
      document.getElementById('homeowner-modal').classList.add('hidden');
      await loadAllData();
      render();
    };
  }

  // ---- PAYMENTS ----
  const addPayBtn = document.getElementById('add-payment-btn');
  if (addPayBtn) addPayBtn.onclick = () => openPaymentModal();

  document.querySelectorAll('[data-edit-payment]').forEach(btn => {
    btn.onclick = () => openPaymentModal(state.payments.find(p => p.id === btn.dataset.editPayment));
  });

  document.querySelectorAll('[data-void-payment]').forEach(btn => {
    btn.onclick = async () => {
      const p = state.payments.find(x => x.id === btn.dataset.voidPayment);
      const { error } = await sb.from('payments').update({ is_voided: !p.is_voided }).eq('id', p.id);
      if (error) return toast(error.message, true);
      toast(p.is_voided ? 'Payment unvoided' : 'Payment voided');
      await loadAllData();
      render();
    };
  });

  document.querySelectorAll('[data-delete-payment]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Delete this payment record permanently?')) return;
      const { error } = await sb.from('payments').delete().eq('id', btn.dataset.deletePayment);
      if (error) return toast(error.message, true);
      toast('Payment deleted');
      await loadAllData();
      render();
    };
  });

  const printAllPay = document.getElementById('print-all-payments');
  if (printAllPay) printAllPay.onclick = () => window.print();

  const payCancel = document.getElementById('pay-cancel');
  if (payCancel) payCancel.onclick = () => document.getElementById('payment-modal').classList.add('hidden');

  const payForm = document.getElementById('payment-form');
  if (payForm) {
    payForm.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('pay-id').value;
      const payload = {
        homeowner_id: document.getElementById('pay-homeowner').value,
        payment_type_id: document.getElementById('pay-type').value,
        or_number: document.getElementById('pay-or').value.trim(),
        amount: parseFloat(document.getElementById('pay-amount').value),
        payment_date: document.getElementById('pay-date').value,
        remarks: document.getElementById('pay-remarks').value.trim(),
      };
      let error;
      if (id) {
        ({ error } = await sb.from('payments').update(payload).eq('id', id));
      } else {
        payload.created_by = state.currentUser.id;
        ({ error } = await sb.from('payments').insert(payload));
      }
      if (error) {
        if (error.message.includes('duplicate') || error.message.includes('unique')) {
          return toast('That OR# is already used. Each OR# must be unique.', true);
        }
        return toast(error.message, true);
      }
      toast('Payment saved');
      document.getElementById('payment-modal').classList.add('hidden');
      await loadAllData();
      render();
    };
  }

  // ---- PAYMENT TYPES MANAGER ----
  const manageTypesBtn = document.getElementById('manage-types-btn');
  if (manageTypesBtn) manageTypesBtn.onclick = () => document.getElementById('types-modal').classList.remove('hidden');

  const typesClose = document.getElementById('types-close');
  if (typesClose) typesClose.onclick = () => document.getElementById('types-modal').classList.add('hidden');

  document.querySelectorAll('[data-save-type]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.saveType;
      const nameInput = document.querySelector(`.type-name-input[data-type-id="${id}"]`);
      const activeInput = document.querySelector(`[data-type-active="${id}"]`);
      const { error } = await sb.from('payment_types').update({ name: nameInput.value.trim(), is_active: activeInput.checked }).eq('id', id);
      if (error) return toast(error.message, true);
      toast('Payment type updated');
      await loadAllData();
      render();
      document.getElementById('types-modal').classList.remove('hidden');
    };
  });

  const addTypeBtn = document.getElementById('add-type-btn');
  if (addTypeBtn) {
    addTypeBtn.onclick = async () => {
      const input = document.getElementById('new-type-name');
      const name = input.value.trim();
      if (!name) return;
      const maxOrder = Math.max(0, ...state.paymentTypes.map(t => t.sort_order || 0));
      const { error } = await sb.from('payment_types').insert({ name, sort_order: maxOrder + 1 });
      if (error) return toast(error.message, true);
      toast('Payment type added');
      await loadAllData();
      render();
      document.getElementById('types-modal').classList.remove('hidden');
    };
  }

  // ---- EXPENSES ----
  const addExpBtn = document.getElementById('add-expense-btn');
  if (addExpBtn) addExpBtn.onclick = () => openExpenseModal();

  document.querySelectorAll('[data-edit-expense]').forEach(btn => {
    btn.onclick = () => openExpenseModal(state.expenses.find(x => x.id === btn.dataset.editExpense));
  });

  document.querySelectorAll('[data-delete-expense]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Delete this expense record?')) return;
      const { error } = await sb.from('expenses').delete().eq('id', btn.dataset.deleteExpense);
      if (error) return toast(error.message, true);
      toast('Expense deleted');
      await loadAllData();
      render();
    };
  });

  const printMonthlyExp = document.getElementById('print-monthly-expenses');
  if (printMonthlyExp) printMonthlyExp.onclick = () => printExpenseReport('monthly');

  const printYearlyExp = document.getElementById('print-yearly-expenses');
  if (printYearlyExp) printYearlyExp.onclick = () => printExpenseReport('yearly');

  const expCancel = document.getElementById('exp-cancel');
  if (expCancel) expCancel.onclick = () => document.getElementById('expense-modal').classList.add('hidden');

  const expForm = document.getElementById('expense-form');
  if (expForm) {
    expForm.onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('exp-id').value;
      const payload = {
        category_id: document.getElementById('exp-category').value,
        description: document.getElementById('exp-description').value.trim(),
        amount: parseFloat(document.getElementById('exp-amount').value),
        expense_date: document.getElementById('exp-date').value,
        receipt_ref: document.getElementById('exp-receipt').value.trim(),
      };
      let error;
      if (id) {
        ({ error } = await sb.from('expenses').update(payload).eq('id', id));
      } else {
        payload.created_by = state.currentUser.id;
        ({ error } = await sb.from('expenses').insert(payload));
      }
      if (error) return toast(error.message, true);
      toast('Expense saved');
      document.getElementById('expense-modal').classList.add('hidden');
      await loadAllData();
      render();
    };
  }

  // ---- REPORTS ----
  const printReportBtn = document.getElementById('print-financial-report');
  if (printReportBtn) printReportBtn.onclick = () => window.print();

  // ---- MEMBER VIEW PRINT ----
  const printMemberBtn = document.getElementById('print-member-history');
  if (printMemberBtn) printMemberBtn.onclick = () => window.print();

  // ---- EMAIL BLAST ----
  const emailForm = document.getElementById('email-form');
  if (emailForm) {
    emailForm.onsubmit = async (e) => {
      e.preventDefault();
      const recipientMode = document.getElementById('email-recipients').value;
      const subject = document.getElementById('email-subject').value.trim();
      const body = document.getElementById('email-body').value.trim();
      const recipients = state.homeowners
        .filter(h => recipientMode === 'everyone' || h.status === 'active')
        .map(h => h.email);

      if (recipients.length === 0) return toast('No recipients found.', true);

      const sendBtn = document.getElementById('email-send-btn');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        const resp = await fetch(EDGE_FUNCTION_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({ subject, body, recipients })
        });
        const result = await resp.json();
        if (!resp.ok) throw new Error(result.error || 'Send failed');

        await sb.from('email_blasts').insert({
          subject, body, recipient_count: recipients.length, sent_by: state.currentUser.id
        });

        toast(`Sent to ${recipients.length} homeowner(s)`);
        emailForm.reset();
      } catch (err) {
        toast('Send failed: ' + err.message, true);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Announcement';
      }
    };
  }
}

}

// =====================================================================
// PRINT HELPERS — build a temporary printable view, then trigger print
// =====================================================================
function printHomeownerStatement(homeownerId) {
  const ho = state.homeowners.find(h => h.id === homeownerId);
  const pays = state.payments.filter(p => p.homeowner_id === homeownerId);
  const total = pays.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Statement - ${escapeHtml(ho.name)}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}
      table{width:100%;border-collapse:collapse;margin-top:16px}
      th,td{border:1px solid #cbd5e1;padding:8px;font-size:13px;text-align:left}
      th{background:#f1f5f9}
      .total{margin-top:16px;font-size:15px;font-weight:bold}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Statement of Account</h2>
    <p><b>${escapeHtml(ho.name)}</b><br>Block ${escapeHtml(ho.block||'-')}, Lot ${escapeHtml(ho.lot||'-')} &middot; ${escapeHtml(ho.area||'-')} sqm<br>${escapeHtml(ho.email)}</p>
    <table><thead><tr><th>Date</th><th>OR #</th><th>Payment Type</th><th>Amount</th><th>Remarks</th></tr></thead>
    <tbody>${pays.map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${escapeHtml(p.or_number)}</td><td>${escapeHtml(p.payment_types?.name||'')}</td><td>${peso(p.amount)}</td><td>${escapeHtml(p.remarks||'')}${p.is_voided?' (VOIDED)':''}</td></tr>`).join('')}</tbody></table>
    <p class="total">Total Paid: ${peso(total)}</p>
    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}

function printExpenseReport(period) {
  const now = new Date();
  let filtered, label;
  if (period === 'monthly') {
    filtered = state.expenses.filter(e => {
      const d = new Date(e.expense_date);
      return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    });
    label = now.toLocaleDateString('en-PH', { month: 'long', year: 'numeric' });
  } else {
    filtered = state.expenses.filter(e => new Date(e.expense_date).getFullYear() === now.getFullYear());
    label = `Year ${now.getFullYear()}`;
  }
  const total = filtered.reduce((s,e)=>s+Number(e.amount),0);

  const win = window.open('', '_blank');
  win.document.write(`
    <html><head><title>Expenses - ${label}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#1e293b}
      h1{font-size:18px;margin-bottom:0} h2{font-size:14px;color:#64748b;margin-top:4px}
      table{width:100%;border-collapse:collapse;margin-top:16px}
      th,td{border:1px solid #cbd5e1;padding:8px;font-size:13px;text-align:left}
      th{background:#f1f5f9}
      .total{margin-top:16px;font-size:15px;font-weight:bold}
    </style></head><body>
    <h1>Maagay 1 Phase 1-B Homeowners Association Inc.</h1>
    <h2>Expense Report — ${label}</h2>
    <table><thead><tr><th>Date</th><th>Category</th><th>Description</th><th>Amount</th><th>Receipt Ref</th></tr></thead>
    <tbody>${filtered.map(e=>`<tr><td>${fmtDate(e.expense_date)}</td><td>${escapeHtml(e.expense_categories?.name||'')}</td><td>${escapeHtml(e.description)}</td><td>${peso(e.amount)}</td><td>${escapeHtml(e.receipt_ref||'')}</td></tr>`).join('') || `<tr><td colspan="5">No expenses recorded for this period.</td></tr>`}</tbody></table>
    <p class="total">Total: ${peso(total)}</p>
    <p style="font-size:11px;color:#94a3b8;margin-top:30px">Generated ${fmtDate(new Date())}</p>
    </body></html>
  `);
  win.document.close();
  setTimeout(() => win.print(), 300);
}
