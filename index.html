const root=document.getElementById('app');
function setState(p){state={...state,...p};render();}
function toast(msg,isError=false){setState({toast:{msg,isError}});setTimeout(()=>setState({toast:null}),3500);}
function peso(n){return'PHP '+Number(n||0).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(d){if(!d)return'';return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});}
function fmtMonthYear(d){if(!d)return'';return new Date(d).toLocaleDateString('en-PH',{year:'numeric',month:'short'});}
function fmtPeriod(p){if(!p.period_from&&!p.period_to)return'';const f=fmtMonthYear(p.period_from),t=fmtMonthYear(p.period_to);if(f&&t)return f===t?f:`${f} – ${t}`;return f||t;}
function esc(s){if(s==null)return'';return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// AUTH
async function loginStaff(u,p){
  const{data,error}=await sb.rpc('verify_app_user',{p_username:u,p_password:p});
  if(error){toast('Login error: '+error.message,true);return;}
  if(!data||data.length===0){toast('Incorrect username or password.',true);return;}
  const user=data[0];
  setState({currentUser:{type:'staff',id:user.id,username:user.username,role:user.role,fullName:user.full_name},view:'dashboard'});
  await loadAllData();
}
async function loginMember(email){
  const{data,error}=await sb.from('homeowners').select('*').eq('email',email.trim()).maybeSingle();
  if(error){toast('Login error: '+error.message,true);return;}
  if(!data){toast('No homeowner record found. Contact the HOA admin.',true);return;}
  setState({currentUser:{type:'member',homeowner:data},view:'member-dashboard'});
  await loadAllData();
}
function logout(){setState({currentUser:null,view:'login',homeowners:[],payments:[],expenses:[]});}

// DATA
async function loadAllData(){
  if(!state.currentUser)return;
  if(state.currentUser.type==='staff'){
    const[hR,ptR,pR,ecR,eR]=await Promise.all([
      sb.from('homeowners').select('*').order('block').order('lot'),
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, homeowners(name,block,lot), payment_types(name)').order('payment_date',{ascending:false}),
      sb.from('expense_categories').select('*').order('sort_order'),
      sb.from('expenses').select('*, expense_categories(name)').order('expense_date',{ascending:false}),
    ]);
    setState({homeowners:hR.data||[],paymentTypes:ptR.data||[],payments:pR.data||[],expenseCategories:ecR.data||[],expenses:eR.data||[]});
  }else{
    const id=state.currentUser.homeowner.id;
    const[ptR,pR]=await Promise.all([
      sb.from('payment_types').select('*').order('sort_order'),
      sb.from('payments').select('*, payment_types(name)').eq('homeowner_id',id).order('payment_date',{ascending:false}),
    ]);
    setState({paymentTypes:ptR.data||[],payments:pR.data||[],homeowners:[state.currentUser.homeowner]});
  }
}
async function loadAdminUsers(){
  const{data,error}=await sb.rpc('list_app_users');
  if(error){toast('Could not load admin accounts: '+error.message,true);return;}
  setState({adminUsers:data||[]});
}
function balanceFor(id){return state.payments.filter(p=>p.homeowner_id===id&&!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);}
function isDuesUpdated(id){
  const ago=new Date();ago.setMonth(ago.getMonth()-3);
  return state.payments.some(p=>{
    if(p.homeowner_id!==id||p.is_voided)return false;
    if(!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return false;
    const d=new Date(p.period_to||p.period_from||p.payment_date);
    return d>=ago;
  });
}

// RENDER
function render(){
  if(state.loading){root.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;"><div class="spinner"></div></div>`;return;}
  let html='';
  if(!state.currentUser)html=renderLogin();
  else if(state.currentUser.type==='member')html=renderMember();
  else html=renderStaff();
  root.innerHTML=html+(state.toast?`<div style="position:fixed;bottom:20px;right:20px;padding:12px 16px;border-radius:10px;color:#fff;font-size:13px;z-index:99;background:${state.toast.isError?'#dc2626':'#059669'}">${esc(state.toast.msg)}</div>`:'');
  attachHandlers();
  if(state.currentUser?.type==='staff'&&state.view==='dashboard')setTimeout(renderCharts,0);
}

  const tabs=[['dashboard','Dashboard','📊'],['homeowners','Homeowners','🏠'],['payments','Payments','💵'],['expenses','Expenses','🧾'],['reports','Reports','📈'],['email','Email','✉️']];

function renderView(){
  switch(state.view){
    case'dashboard':return renderDashboard();
    case'homeowners':return renderHomeowners();
    case'payments':return renderPayments();
    case'expenses':return renderExpenses();
    case'reports':return renderReports();
    case'email':return renderEmail();
    default:return renderDashboard();
  }
}

// DASHBOARD
let incChart=null,expChart=null;
function renderDashboard(){
  const yr=new Date().getFullYear();
  const ti=state.payments.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const te=state.expenses.reduce((s,e)=>s+Number(e.amount),0);
  const bal=ti-te;
  const am=state.homeowners.filter(h=>h.status==='active').length;
  return`<h1 style="font-weight:700;font-size:20px;margin-bottom:16px;">📊 Dashboard</h1>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
    <div class="card" style="border-left:4px solid #60a5fa;"><p style="font-size:11px;color:#64748b;">🏠 Active Homeowners</p><p style="font-size:24px;font-weight:700;color:#2563eb;">${am}</p></div>
    <div class="card" style="border-left:4px solid #34d399;"><p style="font-size:11px;color:#64748b;">💰 Total Collected</p><p style="font-size:22px;font-weight:700;color:#059669;">${peso(ti)}</p></div>
    <div class="card" style="border-left:4px solid #fb7185;"><p style="font-size:11px;color:#64748b;">🧾 Total Expenses</p><p style="font-size:22px;font-weight:700;color:#e11d48;">${peso(te)}</p></div>
    <div class="card" style="border-left:4px solid #a78bfa;"><p style="font-size:11px;color:#64748b;">📈 Net Balance</p><p style="font-size:22px;font-weight:700;color:${bal>=0?'#7c3aed':'#e11d48'}">${peso(bal)}</p></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:12px;margin-bottom:20px;">
    <div class="card"><h3 style="font-weight:600;font-size:14px;margin-bottom:12px;">💰 Monthly Collections — ${yr}</h3><canvas id="income-chart" height="200"></canvas></div>
    <div class="card"><h3 style="font-weight:600;font-size:14px;margin-bottom:12px;">🧾 Monthly Expenses — ${yr}</h3><canvas id="expense-chart" height="200"></canvas></div>
  </div>
  <div class="card"><h3 style="font-weight:600;font-size:14px;margin-bottom:12px;">💵 Recent Payments</h3>
  <div style="overflow-x:auto;"><table><thead><tr><th>Date</th><th>Homeowner</th><th>OR #</th><th>Type</th><th>Amount</th></tr></thead>
  <tbody>${state.payments.slice(0,8).map(p=>`<tr><td>${fmtDate(p.payment_date)}</td><td>${esc(p.homeowners?.name||'')}</td><td>${esc(p.or_number)}</td><td>${esc(p.payment_types?.name||'')}</td><td>${peso(p.amount)}</td></tr>`).join(')||`<tr><td colspan="5" style="text-align:center;color:#94a3b8;">No payments yet</td></tr>`}</tbody>
  </table></div></div>`;
}

function renderCharts(){
  const yr=new Date().getFullYear();
  const ml=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const inc=new Array(12).fill(0);
  const exp=new Array(12).fill(0);
  state.payments.forEach(p=>{if(p.is_voided)return;const d=new Date(p.payment_date);if(d.getFullYear()===yr)inc[d.getMonth()]+=Number(p.amount);});
  state.expenses.forEach(e=>{const d=new Date(e.expense_date);if(d.getFullYear()===yr)exp[d.getMonth()]+=Number(e.amount);});
  const ic=document.getElementById('income-chart');
  const ec=document.getElementById('expense-chart');
  if(!ic||!ec||typeof Chart==='undefined')return;
  if(incChart)incChart.destroy();
  if(expChart)expChart.destroy();
  const opts={responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{callback:v=>'₱'+v.toLocaleString()}}}};
  incChart=new Chart(ic,{type:'line',data:{labels:ml,datasets:[{label:'Collections',data:inc,borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.3,fill:true,pointBackgroundColor:'#10b981'}]},options:opts});
  expChart=new Chart(ec,{type:'line',data:{labels:ml,datasets:[{label:'Expenses',data:exp,borderColor:'#f43f5e',backgroundColor:'rgba(244,63,94,0.1)',tension:0.3,fill:true,pointBackgroundColor:'#f43f5e'}]},options:opts});
}

// HOMEOWNERS
function renderHomeowners(){
  const isSuper=state.currentUser.role==='super_admin';
  const sort=state.homeownerSort;
  const q=state.homeownerSearch.trim().toLowerCase();
  let rows=[...state.homeowners];
  if(q)rows=rows.filter(h=>(h.name||'').toLowerCase().includes(q)||(h.block||'').toLowerCase().includes(q)||(h.lot||'').toLowerCase().includes(q)||(h.email||'').toLowerCase().includes(q));
  if(sort.field){rows.sort((a,b)=>{let av,bv;if(sort.field==='name'){av=(a.name||'').toLowerCase();bv=(b.name||'').toLowerCase();}else{av=parseFloat(a.block)||a.block||'';bv=parseFloat(b.block)||b.block||'';}return av<bv?(sort.dir==='asc'?-1:1):av>bv?(sort.dir==='asc'?1:-1):0;});}
  const arr=f=>sort.field!==f?`<span style="color:#cbd5e1;margin-left:4px;">⇕</span>`:(sort.dir==='asc'?`<span style="color:#2563eb;margin-left:4px;">↑</span>`:`<span style="color:#2563eb;margin-left:4px;">↓</span>`);
  return`<div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;" class="no-print">
  <h1 style="font-weight:700;font-size:20px;">🏠 Homeowners</h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    <button id="print-masterlist-btn" style="font-size:13px;background:#dbeafe;color:#1d4ed8;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;font-weight:500;">🖨️ Print Masterlist</button>
    ${isSuper?`<button id="add-homeowner-btn" style="font-size:13px;color:#fff;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;font-weight:500;background:#2563eb;">+ Add Homeowner</button>`:''}
  </div></div>
  <div class="card no-print" style="margin-bottom:12px;">
    <input type="text" id="homeowner-search" placeholder="Search by name, block, lot, or email..." value="${esc(state.homeownerSearch)}" style="width:100%;border:1px solid #d1fae5;border-radius:8px;padding:8px 12px;font-size:13px;box-sizing:border-box;">
  </div>
  <div class="card" style="overflow-x:auto;">
  <table><thead><tr>

// PAYMENTS
function renderPayments(){
  const isSuper=state.currentUser.role==='super_admin';
  const f=state.paymentFilter;
  const s=state.paymentSort;
  const q=f.search.trim().toLowerCase();
  let rows=[...state.payments];
  if(q)rows=rows.filter(p=>(p.homeowners?.name||'').toLowerCase().includes(q)||(p.or_number||'').toLowerCase().includes(q)||(p.homeowners?.block||'').toLowerCase().includes(q)||(p.homeowners?.lot||'').toLowerCase().includes(q));
  if(f.typeId)rows=rows.filter(p=>p.payment_type_id===f.typeId);
  if(s.field){rows.sort((a,b)=>{let av,bv;if(s.field==='date'){av=new Date(a.payment_date);bv=new Date(b.payment_date);}else{av=(a.or_number||'').toLowerCase();bv=(b.or_number||'').toLowerCase();}return av<bv?(s.dir==='asc'?-1:1):av>bv?(s.dir==='asc'?1:-1):0;});}
  const arr=f=>s.field!==f?`<span style="color:#cbd5e1;margin-left:4px;">⇕</span>`:(s.dir==='asc'?`<span style="color:#d97706;margin-left:4px;">↑</span>`:`<span style="color:#d97706;margin-left:4px;">↓</span>`);
  return`<div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;margin-bottom:16px;" class="no-print">
  <h1 style="font-weight:700;font-size:20px;">💵 Payments</h1>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    ${isSuper?`<button id="manage-types-btn" style="font-size:13px;background:#fef3c7;color:#92400e;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;">⚙️ Types</button>
    <button id="add-payment-btn" style="font-size:13px;color:#fff;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;background:#d97706;">+ Log Payment</button>`:''}
    <button id="print-ledger-btn" style="font-size:13px;background:#fef3c7;color:#92400e;border:none;cursor:pointer;padding:8px 14px;border-radius:8px;">🖨️ Print Ledger</button>
  </div></div>
  <div class="card no-print" style="margin-bottom:12px;display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;">
    <div style="flex:1;min-width:200px;"><label style="font-size:11px;font-weight:600;color:#64748b;">Search</label><input type="text" id="payment-search" placeholder="Name, OR#, block, or lot..." value="${esc(f.search)}" style="width:100%;border:1px solid #fde68a;border-radius:8px;padding:8px;font-size:13px;box-sizing:border-box;margin-top:4px;"></div>
    <div style="min-width:160px;"><label style="font-size:11px;font-weight:600;color:#64748b;">Payment Type</label><select id="payment-type-filter" style="width:100%;border:1px solid #fde68a;border-radius:8px;padding:8px;font-size:13px;box-sizing:border-box;margin-top:4px;"><option value="">All Types</option>${state.paymentTypes.map(t=>`<option value="${t.id}" ${f.typeId===t.id?'selected':''}>${esc(t.name)}</option>`).join('')}</select></div>
    ${(f.search||f.typeId)?`<button id="payment-filter-clear" style="font-size:12px;color:#d97706;background:none;border:none;cursor:pointer;padding-bottom:8px;">Clear</button>`:''}
  </div>
  <div class="card" style="overflow-x:auto;">
  <table><thead><tr>
    <th><button data-pay-sort="date" style="background:none;border:none;cursor:pointer;font-weight:600;display:flex;align-items:center;">Date${arr('date')}</button></th>
    <th>Homeowner</th><th>Blk/Lot</th>
    <th><button data-pay-sort="or" style="background:none;border:none;cursor:pointer;font-weight:600;display:flex;align-items:center;">OR #${arr('or')}</button></th>
    <th>Type</th><th>Period</th><th>Amount</th><th>Remarks</th><th class="no-print">Actions</th>
  </tr></thead><tbody>
  ${rows.map(p=>`<tr style="${p.is_voided?'opacity:0.4;text-decoration:line-through;':''}">
    <td>${fmtDate(p.payment_date)}</td><td>${esc(p.homeowners?.name||'')}</td><td>${esc(p.homeowners?.block||'')}/${esc(p.homeowners?.lot||'')}</td>
    <td>${esc(p.or_number)}</td><td>${esc(p.payment_types?.name||'')}</td>
    <td>${fmtPeriod(p)?`<span style="font-size:11px;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:20px;">${fmtPeriod(p)}</span>`:'—'}</td>
    <td>${peso(p.amount)}</td><td>${esc(p.remarks||'')}</td>
    <td class="no-print" style="white-space:nowrap;">
      ${isSuper?`<button data-edit-payment="${p.id}" style="font-size:12px;color:#64748b;background:none;border:none;cursor:pointer;margin-right:4px;">Edit</button>
      <button data-void-payment="${p.id}" style="font-size:12px;color:#d97706;background:none;border:none;cursor:pointer;margin-right:4px;">${p.is_voided?'Unvoid':'Void'}</button>
      <button data-delete-payment="${p.id}" style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;">Del</button>`:`<span style="font-size:11px;color:#94a3b8;">view only</span>`}
    </td>
  </tr>`).join('')||`<tr><td colspan="9" style="text-align:center;color:#94a3b8;">No payments match</td></tr>`}
  </tbody></table></div>
  ${renderPaymentModal()}${renderTypesModal()}${renderLedgerModal()}`;
}

function renderDuesGrid(years){
  const gridYears=[2020,2021,2022,2023,2024,2025,2026];
  const target=state.duesAnnualTarget;
  const monthlyRate=target/12;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};
  active.forEach(h=>{totals[h.id]={};gridYears.forEach(y=>totals[h.id][y]=0);});
  state.payments.forEach(p=>{
    if(p.is_voided)return;
    if(duesType&&p.payment_type_id!==duesType.id)return;
    if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;
    if(!totals[p.homeowner_id])return;
    const alloc=allocateDues(p,monthlyRate);
    Object.entries(alloc).forEach(([y,amt])=>{const yr=parseInt(y);if(totals[p.homeowner_id][yr]!==undefined)totals[p.homeowner_id][yr]+=amt;});
  });
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=target?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  return`<div class="card" style="margin-bottom:16px;" id="dues-grid-area">
  <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px;" class="no-print">
    <div><h3 style="font-weight:600;font-size:14px;">🗓️ Monthly Dues — Yearly Collection Grid</h3><p style="font-size:11px;color:#64748b;">🟢 Fully paid &nbsp;🟡 Partial &nbsp;🔴 None</p></div>
    <div style="display:flex;align-items:center;gap:8px;">
      <label style="font-size:11px;font-weight:600;color:#64748b;">Full year (₱):</label>
      <input type="number" id="dues-target-input" value="${target}" step="1" style="width:72px;border:1px solid #d1fae5;border-radius:6px;padding:6px;font-size:13px;">
      <button id="print-dues-grid" style="font-size:13px;background:#d1fae5;color:#064e3b;border:none;cursor:pointer;padding:7px 12px;border-radius:8px;">🖨️ Print</button>
    </div>
  </div>
  <div style="overflow-x:auto;max-height:420px;overflow-y:auto;">
  <table style="font-size:11px;">
    <thead style="position:sticky;top:0;z-index:2;">
      <tr>
        <th style="position:sticky;left:0;z-index:3;background:#f0fdf4;white-space:nowrap;">Name</th>
        <th style="background:#f0fdf4;">Blk/Lot</th>
        ${gridYears.map(y=>`<th style="background:#f0fdf4;text-align:center;">${y}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${active.map(h=>`<tr>
      <td style="position:sticky;left:0;background:#fff;z-index:1;font-weight:500;white-space:nowrap;padding:4px 8px;">${esc(h.name)}</td>
      <td style="padding:4px 8px;">${esc(h.block||'')}/${esc(h.lot||'')}</td>
      ${gridYears.map(y=>`<td style="${cs(totals[h.id][y])}padding:4px 8px;text-align:center;">${fmt(totals[h.id][y])}</td>`).join('')}
    </tr>`).join('')||`<tr><td colspan="${gridYears.length+2}" style="text-align:center;color:#94a3b8;padding:12px;">No active homeowners</td></tr>`}
    </tbody>
  </table></div></div>`;
}

function allocateDues(payment,monthlyRate){
  if(!payment.period_from&&!payment.period_to){
    const y=new Date(payment.payment_date).getFullYear();
    return{[y]:Number(payment.amount)};
  }
  const fromStr=(payment.period_from||payment.period_to).slice(0,7);
  const toStr=(payment.period_to||payment.period_from).slice(0,7);
  const from=new Date(fromStr+'-01');
  const to=new Date(toStr+'-01');
  const alloc={};
  const cur=new Date(from);
  let rem=Number(payment.amount);
  while(cur<=to&&rem>0){
    const y=cur.getFullYear();
    const chunk=Math.min(monthlyRate,rem);
    alloc[y]=(alloc[y]||0)+chunk;
    rem-=chunk;
    cur.setMonth(cur.getMonth()+1);
  }
  if(rem>0){const ly=to.getFullYear();alloc[ly]=(alloc[ly]||0)+rem;}
  return alloc;
}

  const eaf=document.getElementById('edit-admin-form');if(eaf)eaf.onsubmit=async e=>{e.preventDefault();const id=document.getElementById('edit-admin-id').value,fn=document.getElementById('edit-admin-fullname').value.trim(),un=document.getElementById('edit-admin-username').value.trim(),role=document.getElementById('edit-admin-role').value,active=document.getElementById('edit-admin-active').checked,pw=document.getElementById('edit-admin-password').value;const msg=document.getElementById('edit-admin-msg');const{error:ue}=await sb.rpc('admin_update_app_user',{p_id:id,p_username:un,p_full_name:fn,p_role:role,p_new_password:pw||null});if(ue){msg.textContent=ue.message.includes('duplicate')?'Username taken.':'Error: '+ue.message;msg.style.color='#ef4444';return;}await sb.rpc('set_app_user_active',{p_id:id,p_is_active:active});toast('Account updated');hideModal('edit-admin-modal');await loadAdminUsers();showModal('admins-modal');};
  const aaform=document.getElementById('add-admin-form');if(aaform)aaform.onsubmit=async e=>{e.preventDefault();const fn=document.getElementById('new-admin-fullname').value.trim(),un=document.getElementById('new-admin-username').value.trim(),pw=document.getElementById('new-admin-password').value,role=document.getElementById('new-admin-role').value;const msg=document.getElementById('admins-msg');const{error}=await sb.rpc('create_app_user',{p_username:un,p_password:pw,p_role:role,p_full_name:fn});if(error){msg.textContent=error.message.includes('duplicate')?'Username taken.':'Error: '+error.message;msg.style.color='#ef4444';return;}msg.textContent='Account created.';msg.style.color='#059669';aaform.reset();await loadAdminUsers();render();showModal('admins-modal');};
}

}
function printMasterlist(dob,income){
  const sort=state.homeownerSort;const q=state.homeownerSearch.trim().toLowerCase();
  let rows=[...state.homeowners];
  if(q)rows=rows.filter(h=>(h.name||'').toLowerCase().includes(q)||(h.block||'').toLowerCase().includes(q));
  if(sort.field)rows.sort((a,b)=>{let av=sort.field==='name'?(a.name||'').toLowerCase():parseFloat(a.block)||a.block||'';let bv=sort.field==='name'?(b.name||'').toLowerCase():parseFloat(b.block)||b.block||'';return av<bv?(sort.dir==='asc'?-1:1):av>bv?(sort.dir==='asc'?1:-1):0;});
  else rows.sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  let rows=[...state.payments];

  rows.sort((a,b)=>new Date(a.payment_date)-new Date(b.payment_date));
  const total=rows.filter(p=>!p.is_voided).reduce((s,p)=>s+Number(p.amount),0);
  const label=from||to?`${from?fmtDate(from):'Beginning'} – ${to?fmtDate(to):'Present'}`:'All Records';

function printRankingReport(){
  const active=state.homeowners.filter(h=>h.status==='active');

function printDuesGrid(){
  const gridYears=[2020,2021,2022,2023,2024,2025,2026];
  const target=state.duesAnnualTarget;const mr=target/12;
  const duesType=state.paymentTypes.find(t=>(t.name||'').toLowerCase().includes('monthly dues'));
  const active=state.homeowners.filter(h=>h.status==='active').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const totals={};active.forEach(h=>{totals[h.id]={};gridYears.forEach(y=>totals[h.id][y]=0);});
  state.payments.forEach(p=>{if(p.is_voided)return;if(duesType&&p.payment_type_id!==duesType.id)return;if(!duesType&&!(p.payment_types?.name||'').toLowerCase().includes('monthly dues'))return;if(!totals[p.homeowner_id])return;const al=allocateDues(p,mr);Object.entries(al).forEach(([y,a])=>{const yr=parseInt(y);if(totals[p.homeowner_id][yr]!==undefined)totals[p.homeowner_id][yr]+=a;});});
  const cs=paid=>paid<=0?'background:#fff5f5;':paid>=target?'background:#dcfce7;color:#166534;':'background:#fef9c3;color:#854d0e;';
  const fmt=paid=>paid>0?Number(paid).toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'';
  const w=window.open('','_blank');
  w.document.write(`<html><head><title>Dues Grid</title><style>@page{size:8.5in 13in landscape;margin:0.4in;}body{font-family:Arial,sans-serif;padding:10px;color:#1e293b;}table{width:100%;border-collapse:collapse;margin-top:12px;}th,td{border:1px solid #cbd5e1;padding:5px 7px;font-size:10px;}th{background:#f1f5f9;text-align:center;}.legend{display:flex;gap:14px;margin-top:10px;font-size:10px;}.swatch{display:inline-block;width:10px;height:10px;margin-right:3px;vertical-align:middle;}</style></head><body>
  <h2 style="font-size:15px;">Maagay 1 Phase 1-B HOA — Monthly Dues Collection Grid</h2>
  <p style="font-size:11px;color:#64748b;">Full year = ${peso(target)}</p>
  <table><thead><tr><th style="text-align:left;">Name</th><th>Blk/Lot</th>${gridYears.map(y=>`<th>${y}</th>`).join('')}</tr></thead>
  <tbody>${active.map(h=>`<tr><td style="text-align:left;">${esc(h.name)}</td><td>${esc(h.block||'')}/${esc(h.lot||'')}</td>${gridYears.map(y=>`<td style="${cs(totals[h.id][y])}text-align:center;">${fmt(totals[h.id][y])}</td>`).join('')}</tr>`).join('')}</tbody></table>
  <div class="legend"><span><span class="swatch" style="background:#dcfce7;"></span>Fully Paid</span><span><span class="swatch" style="background:#fef9c3;"></span>Partial</span><span><span class="swatch" style="background:#fff5f5;"></span>None</span></div>
  <p style="font-size:10px;color:#94a3b8;margin-top:16px;">Generated ${fmtDate(new Date())}</p>
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}
